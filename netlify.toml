[build]
  publish = "."
  functions = "netlify/functions"

# Bundle non-code files (images, fonts) with the functions that need them.
# Without this, the runtime container won't have the shield PNG and cert
# generation fails with ENOENT. The /fonts/ directory is needed for the cert
# PDF to embed EB Garamond + Jost (matches the website typography).
[functions]
  included_files = ["netlify/functions/assets/**", "fonts/**"]

# Scheduled functions — run daily to recover abandoned applications.
# Cron is UTC. 14:00 UTC = 14:00 GMT / 15:00 BST / 15:00 IST (Ireland Standard).
# Mid-afternoon lands in a reasonable inbox window across IE/UK/EU/US-East.
[functions."daily-abandoned-sweep"]
  schedule = "0 14 * * *"

# Gift-recipient renewal reminder sweep. Offset 30min from the abandoned
# sweep so they don't compete for the function runtime. Also ~15:30 Ireland
# time - mid-afternoon reading window works just as well for this email.
[functions."daily-expiry-sweep"]
  schedule = "30 14 * * *"

# Cert publication sweep — handles day-29 publication reminder + day-30
# auto-publish for members who never explicitly published. Offset another
# 30min from expiry sweep so daily fan-out is staggered.
[functions."daily-cert-sweep"]
  schedule = "0 15 * * *"

# Gift acceptance sweep (Phase 3 — 2026-04-30) — handles two time-based
# transitions for the deferred-acceptance gift flow:
#   (A) day-30 reminder for unclaimed gifts (founder + paid)
#   (B) day-365 lapse for gifts past their 1-year hold window
# Offset 30min from the cert sweep — keeps the daily fan-out staggered
# so no two scheduled functions compete for the same runtime slot.
# 15:30 UTC = 16:30 IE/UK summer, 15:30 winter — mid-afternoon European
# inbox window for the recipient nudge.
[functions."daily-gift-acceptance-sweep"]
  schedule = "30 15 * * *"

# Post-signup email lifecycle sweep — dispatches the +3/+9/+18/+28/+60/+90 day
# sequence (Herald → Fergus → Linda Office × 3 → Paddy Seanchaí). Runs once per
# day, age-bucketed (each member becomes eligible for exactly one bucket on
# exactly one day). 16:00 UTC = 17:00 IE/UK summer, 16:00 winter — mid-afternoon
# European inbox window. Offset another 30min from the gift-acceptance sweep so
# the daily fan-out remains staggered.
[functions."daily-post-signup-sweep"]
  schedule = "0 16 * * *"

# PDF lead-magnet lifecycle sweep — dispatches the +3/+10/+21/+35 day
# follow-up emails (Email 1 fires synchronously on confirmation, not
# from this cron). 16:30 UTC = 17:30 IE/UK summer, 16:30 winter — same
# late-afternoon European inbox window as the post-signup sweep,
# offset 30min so the daily fan-out remains staggered.
[functions."daily-pdf-lead-sweep"]
  schedule = "30 16 * * *"

[[redirects]]
  from = "/roots"
  to = "/roots.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# history.html consolidated into pedigree.html (Nov 2026). Preserve SEO value from
# Google's existing index of /history.html + any external links by 301-ing permanently.
[[redirects]]
  from = "/history.html"
  to = "/pedigree.html"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
