<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribed · Clan Ó Comáin</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="stylesheet" href="shared.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    .unsub-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;background:var(--cream);text-align:center}
    .unsub-card{max-width:520px;background:var(--white);border:1px solid var(--border);padding:40px;border-radius:2px}
    .unsub-card h1{font-family:'EB Garamond',serif;font-size:26px;font-weight:400;color:var(--ink);margin-bottom:14px}
    .unsub-card p{font-family:'EB Garamond',serif;font-size:16px;line-height:1.7;color:var(--ink-soft)}
  </style>
</head>
<body>
  <div class="unsub-wrap">
    <div class="unsub-card">
      <h1>You have been unsubscribed</h1>
      <p>The Office of Clan Ó Comáin will not write to you further on this matter. With our thanks for the interest you took in the clan.</p>
      <p style="margin-top:18px"><a href="/" style="color:var(--gold-deep);text-decoration:underline">Return to the clan home</a></p>
    </div>
  </div>
</body>
</html>
