<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members' Area — Clan Ó Comáin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="stylesheet" href="/shared.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    body{background:var(--cream);min-height:100vh}
    /* Header strip */
    .mhdr{background:var(--ink);border-bottom:2px solid var(--gold);padding:18px 0}
    .mhdr-inner{max-width:1040px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .mhdr-brand{display:flex;align-items:center;gap:14px;text-decoration:none}
    .mhdr-brand img{height:38px;width:auto}
    .mhdr-brand-text{font-family:'EB Garamond',serif;font-size:20px;color:var(--gold-pale)}
    .mhdr-brand-text em{color:var(--gold-light);font-style:italic}
    .mhdr-nav{display:flex;align-items:center;gap:22px}
    .mhdr-nav a{font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(184,151,90,.7);text-decoration:none}
    .mhdr-nav a:hover{color:var(--gold-light)}
    .mhdr-signout{font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(215,235,215,.55);background:transparent;border:1px solid rgba(184,151,90,.25);padding:8px 14px;border-radius:1px;cursor:pointer}
    .mhdr-signout:hover{color:var(--gold-light);border-color:var(--gold)}

    /* Main */
    .mmain{max-width:1040px;margin:0 auto;padding:60px 24px 80px}
    .mwelcome{text-align:center;margin-bottom:48px}
    .mwelcome-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
    .mwelcome-title{font-family:'EB Garamond',serif;font-size:clamp(30px,4.5vw,46px);font-weight:400;color:var(--ink);line-height:1.1;margin-bottom:12px}
    .mwelcome-title em{color:var(--gold);font-style:italic}
    .mwelcome-sub{font-family:'EB Garamond',serif;font-size:17px;font-style:italic;color:var(--ink-soft);max-width:600px;margin:0 auto;line-height:1.7}

    /* Status card — the "your membership" panel */
    .mstatus{max-width:720px;margin:0 auto 40px;background:var(--white);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:36px 40px;border-radius:2px;box-shadow:0 6px 24px rgba(12,26,12,.06)}
    .mstatus-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
    .mstatus-head-label{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .mstatus-head-tier{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);margin-top:2px}
    .mbadge{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:5px 10px;border-radius:1px}
    .mbadge.active{background:rgba(160,180,100,.18);color:#556B1F;border:1px solid rgba(160,180,100,.4)}
    .mbadge.lapsed{background:rgba(210,150,80,.18);color:#8F5E1B;border:1px solid rgba(210,150,80,.4)}
    .mbadge.cancelled{background:rgba(180,180,180,.18);color:#666;border:1px solid rgba(180,180,180,.4)}
    .mstatus-rows{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px 32px}
    .mstatus-row-label{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px}
    .mstatus-row-value{font-family:'EB Garamond',serif;font-size:17px;color:var(--ink)}

    /* Gift panel — only renders when member.gift is present. Permanent
       "this membership was a gift from [giver]" card, with the personal
       message quoted so the recipient can return to it any time. */
    .mgift{max-width:720px;margin:0 auto 26px;background:var(--cream-dark);border:1px solid var(--gold-border);border-left:3px solid var(--gold);padding:28px 30px;border-radius:0 2px 2px 0;box-shadow:0 4px 14px rgba(12,26,12,.04)}
    .mgift-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .mgift-title{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:6px}
    .mgift-title em{color:var(--gold);font-style:italic}
    .mgift-meta{font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--ink-muted);margin-bottom:16px}
    .mgift-message{font-family:'EB Garamond',serif;font-size:16px;color:var(--ink-soft);line-height:1.8;margin:0;padding:16px 0 0;border-top:1px solid var(--gold-border);white-space:pre-wrap}
    .mgift-message::before{content:'"';font-family:'EB Garamond',serif;font-size:38px;color:var(--gold);line-height:0;position:relative;top:14px;margin-right:6px}

    /* Family panel — only renders for Family-tier members. Two roles: shows
       current family details + provides a single edit/manage CTA that opens
       a small modal/form on the dashboard. Same visual language as the gift
       card so they sit side-by-side coherently. */
    .mfam{max-width:720px;margin:0 auto 26px;background:var(--white);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:28px 30px;border-radius:2px}
    .mfam-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .mfam-title{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:14px}
    .mfam-title em{color:var(--gold);font-style:italic}
    .mfam-list{font-family:'EB Garamond',serif;font-size:16px;color:var(--ink-soft);line-height:1.8;margin:0 0 18px}
    .mfam-list .mfam-row{display:flex;gap:10px;align-items:baseline;margin-bottom:6px}
    .mfam-list .mfam-row-label{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);min-width:90px;flex-shrink:0}
    .mfam-list .mfam-row-value{color:var(--ink)}
    .mfam-empty{font-family:'EB Garamond',serif;font-size:15px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 18px}
    .mfam-edit-btn{display:inline-block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-strong);background:transparent;border:1px solid var(--gold);padding:10px 22px;border-radius:1px;text-decoration:none;cursor:pointer;transition:all .2s}
    .mfam-edit-btn:hover{background:rgba(184,151,90,.08)}

    /* Privacy / Public Register card — separate concern from family details
       because individual members may have privacy preferences too. Visible
       to ALL members, family or not. */
    .mpriv{max-width:720px;margin:0 auto 26px;background:var(--white);border:1px solid var(--border);padding:24px 28px;border-radius:2px}
    .mpriv-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
    .mpriv-title{font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:12px}
    .mpriv-row{display:flex;align-items:flex-start;gap:12px;font-family:'EB Garamond',serif;font-size:15px;color:var(--ink-soft);line-height:1.55;margin-bottom:10px}
    .mpriv-row input{margin-top:4px;width:16px;height:16px;cursor:pointer;flex-shrink:0}
    .mpriv-note{font-family:'EB Garamond',serif;font-size:12.5px;font-style:italic;color:var(--ink-muted);margin:8px 0 0;line-height:1.55}
    .mpriv-status{font-family:'EB Garamond',serif;font-size:12.5px;font-style:italic;color:var(--ink-muted);margin-top:10px;min-height:16px}

    /* Action cards */
    .mactions{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
    .maction{background:var(--white);border:1px solid var(--border);padding:26px 26px 22px;border-radius:2px;text-align:center;transition:border-color .2s,transform .15s}
    .maction.live:hover{border-color:var(--gold);transform:translateY(-2px)}
    .maction-eyebrow{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .maction.coming .maction-eyebrow{color:rgba(184,151,90,.55)}
    .maction-title{font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);margin-bottom:10px}
    .maction-desc{font-family:'EB Garamond',serif;font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:14px}
    .maction-btn{display:inline-block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:var(--gold);padding:10px 20px;border-radius:1px;text-decoration:none;border:0;cursor:pointer}
    .maction-btn:hover{background:var(--gold-light)}
    .maction-btn.secondary{background:transparent;color:var(--gold);border:1px solid var(--gold)}
    .maction-btn:disabled,.maction.coming .maction-btn{opacity:.5;cursor:not-allowed;background:rgba(184,151,90,.15);color:rgba(12,26,12,.5)}

    /* Loading / error states */
    .mloading,.merror{text-align:center;padding:120px 24px;font-family:'EB Garamond',serif;color:var(--ink-soft);font-size:17px}
    .merror{color:var(--ink)}
    .merror .btn{margin-top:20px;display:inline-block;background:var(--gold);color:var(--ink);font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:14px 28px;border-radius:1px;text-decoration:none}

    @media(max-width:640px){
      .mhdr-inner{flex-wrap:wrap}
      .mhdr-nav{gap:14px}
      .mstatus{padding:26px 22px;margin-left:12px;margin-right:12px}
    }
  </style>
</head>
<body>

<div class="mhdr">
  <div class="mhdr-inner">
    <a href="/" class="mhdr-brand">
      <img src="/coat_of_arms.png" alt="Ó Comáin">
      <span class="mhdr-brand-text">Clan <em>Ó Comáin</em></span>
    </a>
    <div class="mhdr-nav">
      <a href="/">Clan website</a>
      <button class="mhdr-signout" id="signOutBtn">Sign out</button>
    </div>
  </div>
</div>

<main class="mmain">
  <div class="mloading" id="loadingState">Loading your membership details…</div>
  <div id="dashboardContent" style="display:none"></div>
  <div id="errorState" style="display:none" class="merror">
    <p id="errorMessage">Something went wrong.</p>
    <a href="/members/login.html" class="btn">Return to sign in →</a>
  </div>
</main>

<script type="module">
  import { currentSession, getMemberProfile, signOut } from './auth.js';

  const loading   = document.getElementById('loadingState');
  const dashboard = document.getElementById('dashboardContent');
  const errorBox  = document.getElementById('errorState');
  const errorMsg  = document.getElementById('errorMessage');
  const signOutBtn = document.getElementById('signOutBtn');

  signOutBtn.addEventListener('click', signOut);

  // Format a timestamp as "17 April 2026"
  function fmtDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  // Format "First name" from full name, fallback to email username
  function firstName(member) {
    if (member.name) return member.name.split(' ')[0];
    return member.email.split('@')[0];
  }

  function renderDashboard(member) {
    const tierLabel = member.tier_label || 'Clan Member';
    const statusBadge = {
      active:    '<span class="mbadge active">Active</span>',
      lapsed:    '<span class="mbadge lapsed">Lapsed</span>',
      cancelled: '<span class="mbadge cancelled">Cancelled</span>',
    }[member.status] || `<span class="mbadge">${member.status}</span>`;

    const isLife = (member.tier || '').startsWith('life');
    const renewalValue = isLife ? 'For life · no renewal' : fmtDate(member.expires_at);

    dashboard.innerHTML = `
      <div class="mwelcome">
        <div class="mwelcome-eyebrow">Welcome home</div>
        <h1 class="mwelcome-title">Dia dhuit, <em>${escHtml(firstName(member))}</em></h1>
        <p class="mwelcome-sub">Your place in the Register of Clan Ó Comáin is confirmed. This is where the clan keeps its promises to you.</p>
      </div>

      <section class="mstatus">
        <div class="mstatus-head">
          <div>
            <div class="mstatus-head-label">Your membership</div>
            <div class="mstatus-head-tier">${escHtml(tierLabel)}</div>
          </div>
          ${statusBadge}
        </div>
        <div class="mstatus-rows">
          <div>
            <div class="mstatus-row-label">Name on the Register</div>
            <div class="mstatus-row-value">${escHtml(member.name || '—')}</div>
          </div>
          <div>
            <div class="mstatus-row-label">Email</div>
            <div class="mstatus-row-value">${escHtml(member.email)}</div>
          </div>
          <div>
            <div class="mstatus-row-label">Joined</div>
            <div class="mstatus-row-value">${fmtDate(member.joined_at)}</div>
          </div>
          <div>
            <div class="mstatus-row-label">${isLife ? 'Duration' : 'Renews'}</div>
            <div class="mstatus-row-value">${renewalValue}</div>
          </div>
        </div>
      </section>

      ${member.gift ? `
      <section class="mgift">
        <div class="mgift-eyebrow">A gift to you</div>
        <div class="mgift-title">A gift from <em>${escHtml(member.gift.buyer_name || member.gift.buyer_email)}</em></div>
        <div class="mgift-meta">Given ${fmtDate(member.gift.gifted_at)}${member.gift.tier_label ? ' · ' + escHtml(member.gift.tier_label) : ''}</div>
        ${member.gift.personal_message ? `<p class="mgift-message">${escHtml(member.gift.personal_message)}</p>` : ''}
      </section>
      ` : ''}

      ${member.tier_family ? `
      <section class="mfam" id="mfam-section">
        <div class="mfam-eyebrow">Your Family on the Membership</div>
        <div class="mfam-title">Family <em>recorded</em></div>
        ${(member.partner_name || (member.children_first_names && member.children_first_names.length)) ? `
          <div class="mfam-list">
            ${member.partner_name ? `
              <div class="mfam-row">
                <div class="mfam-row-label">Partner</div>
                <div class="mfam-row-value">${escHtml(member.partner_name)}</div>
              </div>
            ` : ''}
            ${(member.children_first_names && member.children_first_names.length) ? `
              <div class="mfam-row">
                <div class="mfam-row-label">Children</div>
                <div class="mfam-row-value">${member.children_first_names.map(escHtml).join(' · ')}</div>
              </div>
            ` : ''}
            ${member.ancestor_dedication ? `
              <div class="mfam-row">
                <div class="mfam-row-label">Dedication</div>
                <div class="mfam-row-value" style="font-style:italic">${escHtml(member.ancestor_dedication)}</div>
              </div>
            ` : ''}
          </div>
        ` : `
          <p class="mfam-empty">Your Family membership covers two adults and any children under your care. Add their names to record them on your certificate and in the Register at Newhall House — your children carry their place in the clan with you, and inherit the membership in their own right in the fullness of time.</p>
        `}
        <button class="mfam-edit-btn" id="mfamEditBtn">${(member.partner_name || (member.children_first_names && member.children_first_names.length)) ? 'Edit family details' : 'Add family details'} →</button>
      </section>
      ` : `
      <section class="mfam" id="mfam-section">
        <div class="mfam-eyebrow">Your Certificate Details</div>
        <div class="mfam-title">Name &amp; <em>dedication</em></div>
        <div class="mfam-list">
          <div class="mfam-row">
            <div class="mfam-row-label">Name on cert</div>
            <div class="mfam-row-value">${escHtml(member.name)}</div>
          </div>
          ${member.ancestor_dedication ? `
            <div class="mfam-row">
              <div class="mfam-row-label">Dedication</div>
              <div class="mfam-row-value" style="font-style:italic">${escHtml(member.ancestor_dedication)}</div>
            </div>
          ` : ''}
        </div>
        ${!member.ancestor_dedication ? `
          <p class="mfam-empty" style="margin-top:4px">Honour an ancestor on your certificate — a grandparent who carried the name, a parent who spoke of home, or a forebear whose story drew you to the clan.</p>
        ` : ''}
        <button class="mfam-edit-btn" id="mfamEditBtn">${member.ancestor_dedication ? 'Edit certificate details' : 'Add a dedication or correct my name'} →</button>
      </section>
      `}

      ${(member.tier && member.tier.startsWith('clan-')) ? `
      <section class="mpriv" style="border-left:3px solid var(--gold)">
        <div class="mpriv-eyebrow">Public Register — a Guardian benefit</div>
        <div class="mpriv-title">Take your place on the public roll</div>
        <p style="font-family:'EB Garamond',serif;font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0 0 8px">The public Founding Members Register at <em>ocomain.org/register</em> is reserved for Guardian-tier members and above — those who have made the deeper commitment to the clan's revival.</p>
        <p class="mpriv-note" style="margin-top:8px"><a href="/membership.html#tiers" style="color:var(--gold-strong);text-decoration:underline;font-style:normal">Upgrade to Guardian</a> any time to take your place on the public roll.</p>
      </section>
      ` : `
      <section class="mpriv">
        <div class="mpriv-eyebrow">Privacy & Public Register</div>
        <div class="mpriv-title">Your visibility on the public register</div>
        <label class="mpriv-row">
          <input type="checkbox" id="prvPublic" ${member.public_register_visible ? 'checked' : ''}>
          <span>Show me on the public Founding Members Register at <em>ocomain.org/register</em>.</span>
        </label>
        ${member.tier_family ? `
        <label class="mpriv-row" id="prvChildrenWrap" style="margin-left:28px;${member.public_register_visible ? '' : 'opacity:.5;pointer-events:none'}">
          <input type="checkbox" id="prvChildren" ${member.children_visible_on_register ? 'checked' : ''} ${member.public_register_visible ? '' : 'disabled'}>
          <span>Include my children's first names on my public entry.</span>
        </label>
        ` : ''}
        <p class="mpriv-note">Both default to off. Your changes save automatically and take effect on the next register page load.</p>
        <div class="mpriv-status" id="prvStatus"></div>
      </section>
      `}

      <section class="mactions">
        <div class="maction live">
          <div class="maction-eyebrow">Available</div>
          <div class="maction-title">Your certificate</div>
          <div class="maction-desc">Your official Certificate of Membership, bearing the Chief's signature — in PDF form for printing, framing, or sharing.</div>
          <button class="maction-btn" id="certBtn">Prepare my certificate →</button>
          <div id="certStatus" style="margin-top:10px;font-family:'EB Garamond',serif;font-size:12px;color:var(--ink-soft);font-style:italic;min-height:18px"></div>
        </div>
        <a class="maction live" style="text-decoration:none;color:inherit;display:block" href="/members/library.html">
          <div class="maction-eyebrow">Members only</div>
          <div class="maction-title">The clan library</div>
          <div class="maction-desc">Private access to primary scholarship on the clan — including Gibson's 1990 UCLA doctoral dissertation <em>Tulach Commáin</em>, his 2008 peer-reviewed article, and Cotter's 1999 Cahercommaun re-assessment.</div>
          <span class="maction-btn">Open library →</span>
        </a>
        <a class="maction live" style="text-decoration:none;color:inherit;display:block" href="/members/contact.html">
          <div class="maction-eyebrow">Members only</div>
          <div class="maction-title">Reach the Council</div>
          <div class="maction-desc">Lineage &amp; DNA queries for the Craoibhscríobhaí, general correspondence to any office, and apply to serve on the Privy Council. All triaged by the Office of the Private Secretary.</div>
          <span class="maction-btn">Write to the Council →</span>
        </a>
        <a class="maction live" style="text-decoration:none;color:inherit;display:block" href="/members/your-line.html">
          <div class="maction-eyebrow">Members only · Bloodline</div>
          <div class="maction-title">Your line in the clan</div>
          <div class="maction-desc">Record what you know of your line — parents, grandparents, earliest Ó Comáin ancestor, DNA status, family stories. Reviewed by the Office and, where the connection is clear, entered into the master pedigree.</div>
          <span class="maction-btn">Submit your line →</span>
        </a>
        <a class="maction live" style="text-decoration:none;color:inherit;display:block" href="/members/year.html">
          <div class="maction-eyebrow">Members' Chronicle · 2026</div>
          <div class="maction-title">The year so far</div>
          <div class="maction-desc">A word from the Chief, the Council taking shape, the Dublin gathering, the library begun, the pedigree written, and what the second year is pointing toward.</div>
          <span class="maction-btn">Read the chronicle →</span>
        </a>
        <a class="maction live" style="text-decoration:none;color:inherit;display:block" href="/members/pedigree.html">
          <div class="maction-eyebrow">Members' Edition</div>
          <div class="maction-title">The clan pedigree</div>
          <div class="maction-desc">Eleven chapters of the clan line, from Bronze Age Ireland to today — navigate the full pedigree by era, with the spine of the line visible at a glance.</div>
          <span class="maction-btn">Open pedigree →</span>
        </a>
        <a class="maction live" style="text-decoration:none;color:inherit;display:block" href="/privy-council.html">
          <div class="maction-eyebrow">Live · open</div>
          <div class="maction-title">The Privy Council</div>
          <div class="maction-desc">The Chief's council — and the open positions available to members.</div>
          <span class="maction-btn">View council →</span>
        </a>
      </section>
    `;
    loading.style.display = 'none';
    dashboard.style.display = 'block';

    // Wire up the certificate download button (rendered dynamically above)
    const certBtn = document.getElementById('certBtn');
    const certStatus = document.getElementById('certStatus');
    let certUrlCache = null;

    certBtn.addEventListener('click', async () => {
      certBtn.disabled = true;
      certBtn.textContent = certUrlCache ? 'Preparing fresh link…' : 'Preparing your certificate…';
      certStatus.textContent = 'This may take a few seconds on first generation.';

      try {
        const session = await currentSession();
        if (!session) {
          window.location.href = '/members/login.html';
          return;
        }

        const res = await fetch('/api/generate-certificate', {
          method: 'POST',
          headers: { Authorization: `Bearer ${session.access_token}` },
        });

        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `Request failed (${res.status})`);
        }

        const { url } = await res.json();
        certUrlCache = url;

        // Trigger the download — opens the signed URL which has a download=
        // filename hint so browsers save instead of opening inline
        window.location.href = url;

        // Give the browser a moment to start the download, then restore button state
        setTimeout(() => {
          certBtn.disabled = false;
          certBtn.textContent = 'Download again →';
          certStatus.textContent = 'Your certificate is on the way. Click again for another copy.';
        }, 800);

      } catch (e) {
        console.error('certificate error:', e);
        certBtn.disabled = false;
        certBtn.textContent = 'Try again →';
        certStatus.style.color = 'var(--ink)';
        certStatus.innerHTML = `Something went wrong — <em>${escHtml(e.message)}</em>. If this persists, please write to <a href="mailto:clan@ocomain.org" style="color:var(--gold)">clan@ocomain.org</a>.`;
      }
    });

    // ── Family edit modal (only present if Family tier) ────────────────────
    const familyEditBtn = document.getElementById('mfamEditBtn');
    if (familyEditBtn) {
      familyEditBtn.addEventListener('click', () => openFamilyModal(member));
    }

    // ── Privacy checkbox auto-save handlers ────────────────────────────────
    const prvPublic = document.getElementById('prvPublic');
    const prvChildren = document.getElementById('prvChildren');
    const prvChildrenWrap = document.getElementById('prvChildrenWrap');
    const prvStatus = document.getElementById('prvStatus');

    async function savePrivacy() {
      prvStatus.textContent = 'Saving…';
      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/update-family-details', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({
            publicRegisterVisible: prvPublic.checked,
            childrenVisibleOnRegister: prvChildren ? (prvChildren.checked && prvPublic.checked) : false,
            privacyOnly: true,
          }),
        });
        if (!r.ok) throw new Error('Could not save');
        const now = new Date();
        prvStatus.textContent = `Saved at ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
      } catch (e) {
        prvStatus.textContent = 'Could not save — please try again';
        prvStatus.style.color = '#922c1f';
      }
    }

    if (prvPublic) {
      prvPublic.addEventListener('change', () => {
        if (prvChildren && prvChildrenWrap) {
          const enabled = prvPublic.checked;
          prvChildren.disabled = !enabled;
          prvChildrenWrap.style.opacity = enabled ? '1' : '.5';
          prvChildrenWrap.style.pointerEvents = enabled ? 'auto' : 'none';
          if (!enabled) prvChildren.checked = false;
        }
        savePrivacy();
      });
    }
    if (prvChildren) {
      prvChildren.addEventListener('change', savePrivacy);
    }
  }

  // ── Family details edit modal ────────────────────────────────────────────
  // Simple inline overlay (no external dependencies). Shown when the
  // "Edit family details" button is clicked on the dashboard. Submits to
  // /api/update-family-details which also triggers a cert regeneration so
  // the member's download picks up the new family names.
  function openFamilyModal(member) {
    const existing = document.getElementById('famModal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'famModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(12,26,12,.82);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;overflow-y:auto';
    const childrenVal = Array.isArray(member.children_first_names) ? member.children_first_names.join('\n') : '';
    const isFamilyTier = !!member.tier_family;
    const isCertLocked = !!member.cert_locked_at;
    const lockedBanner = isCertLocked ? `
      <div style="background:rgba(184,151,90,.12);border:1px solid rgba(184,151,90,.35);border-left:3px solid var(--gold);padding:14px 18px;margin:0 0 22px;border-radius:2px">
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:6px">Certificate locked</div>
        <p style="font-family:'EB Garamond',serif;font-size:13.5px;line-height:1.6;color:var(--ink-soft);margin:0">A cert is a one-time heraldic instrument. Your grace window has closed, so edits here update your entry in the Register at Newhall House but do not regenerate the PDF. To request a new cert, please write to <a href="mailto:clan@ocomain.org" style="color:var(--gold)">clan@ocomain.org</a>.</p>
      </div>
    ` : '';
    modal.innerHTML = `
      <div style="max-width:560px;width:100%;background:var(--cream);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:36px 36px 32px;border-radius:2px;max-height:90vh;overflow-y:auto">
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Edit your certificate</div>
        <h3 style="font-family:'EB Garamond',serif;font-size:24px;color:var(--ink);font-weight:400;line-height:1.2;margin:0 0 10px">Your certificate details</h3>
        <p style="font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 22px">${isCertLocked ? 'Edits update your entry in the Register at Newhall House.' : 'Changes within your 30-day grace window regenerate your certificate. The new version replaces your existing cert.'}</p>

        ${lockedBanner}

        <!-- Name on cert -->
        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Your name on the certificate</label>
        <input type="text" id="famModalName" value="${escHtml(member.name || '')}" placeholder="Full name as it should appear on the cert" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:18px">

        <!-- Ancestor dedication -->
        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">An ancestor you wish to honour <span style="color:var(--ink-muted);font-weight:400;letter-spacing:.06em;text-transform:none">— optional</span></label>
        <input type="text" id="famModalAncestor" value="${escHtml(member.ancestor_dedication || '')}" placeholder="e.g. In memory of my grandfather, Patrick Cummins of Ennistymon, 1908\u20131984" maxlength="140" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:6px">
        <p style="font-family:'EB Garamond',serif;font-size:12.5px;font-style:italic;color:var(--ink-muted);margin:0 0 18px;line-height:1.55">For the cert dedication line. Write it exactly as you want it to appear — "In memory of, or in honour of".</p>

        ${isFamilyTier ? `
        <!-- Family (only for Family tier) -->
        <div style="border-top:1px solid var(--gold-border);margin:8px 0 18px;padding-top:18px">
          <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Partner / Spouse</label>
          <input type="text" id="famModalPartner" value="${escHtml(member.partner_name || '')}" placeholder="Full name — or leave blank" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:18px">
          <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Children — first names, one per line</label>
          <textarea id="famModalChildren" rows="4" placeholder="Or leave blank" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;resize:vertical;line-height:1.5">${escHtml(childrenVal)}</textarea>
          <p style="font-family:'EB Garamond',serif;font-size:12.5px;font-style:italic;color:var(--ink-muted);margin:8px 0 12px;line-height:1.55">First names only. Surnames are never publicly displayed.</p>

          <!-- Inheritance caveat -->
          <div style="background:rgba(184,151,90,.08);border-left:3px solid var(--gold);padding:12px 16px;margin:8px 0 18px">
            <p style="font-family:'EB Garamond',serif;font-size:12.5px;font-style:italic;color:var(--ink-soft);margin:0;line-height:1.6"><strong style="color:var(--ink);font-style:normal">On inheritance:</strong> Children named on your original Family membership carry an inheritance right to this membership in time. Children born after sign-up are not covered — a new Family enrolment is required to include them for inheritance.</p>
          </div>
        </div>
        ` : ''}

        <div id="famModalStatus" style="display:none;padding:12px 14px;margin-bottom:16px;border-radius:1px;font-family:'EB Garamond',serif;font-size:14px"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="famModalCancel" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);background:transparent;border:1px solid var(--border);padding:11px 22px;border-radius:1px;cursor:pointer">Cancel</button>
          <button id="famModalSave" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:12px 26px;border-radius:1px;cursor:pointer">${isCertLocked ? 'Save to Register' : 'Save & update cert'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const close = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.getElementById('famModalCancel').addEventListener('click', close);

    document.getElementById('famModalSave').addEventListener('click', async () => {
      const nameVal = document.getElementById('famModalName').value.trim();
      const ancestorVal = document.getElementById('famModalAncestor').value.trim();
      const partnerEl = document.getElementById('famModalPartner');
      const childrenEl = document.getElementById('famModalChildren');
      const partner = partnerEl ? partnerEl.value.trim() : '';
      const childrenRaw = childrenEl ? childrenEl.value.trim() : '';
      const children = childrenRaw ? childrenRaw.split(/[\n,]/).map(s => s.trim()).filter(Boolean) : [];
      const statusEl = document.getElementById('famModalStatus');
      const saveBtn = document.getElementById('famModalSave');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';
      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/update-family-details', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({
            nameOnCert: nameVal || null,
            ancestorDedication: ancestorVal || null,
            partnerName: partner || null,
            childrenFirstNames: children,
          }),
        });
        if (!r.ok) { const j = await r.json().catch(()=>({})); throw new Error(j.error || 'Save failed'); }
        const result = await r.json().catch(() => ({}));
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(184,151,90,.15)';
        statusEl.style.color = 'var(--ink)';
        if (result.certLocked) {
          statusEl.innerHTML = 'Saved to the Register at Newhall House. Your certificate PDF is locked — contact <a href="mailto:clan@ocomain.org" style="color:var(--gold)">clan@ocomain.org</a> to request a new cert.';
        } else {
          statusEl.innerHTML = 'Saved. Your certificate has been regenerated. Reloading…';
        }
        setTimeout(() => window.location.reload(), 1800);
      } catch (e) {
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.textContent = 'Could not save — ' + (e.message || 'please try again');
        saveBtn.disabled = false;
        saveBtn.textContent = isCertLocked ? 'Save to Register' : 'Save & update cert';
      }
    });
  }

  function escHtml(t) {
    return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  (async () => {
    try {
      // If the magic-link return URL contains an auth error (expired token,
      // already-used link, etc.), Supabase puts the error code in the hash.
      // Detect that BEFORE waiting for a session — there won't be one — and
      // forward to the login page with an `expired=1` flag so it can offer
      // a one-click resend instead of forcing the member to retype email.
      const hash = window.location.hash || '';
      if (hash.includes('error=') || hash.includes('error_code=')) {
        window.location.href = '/members/login.html?expired=1';
        return;
      }

      // Wait for session to be established from URL hash (magic-link return)
      await new Promise(r => setTimeout(r, 200));
      const session = await currentSession();
      if (!session) {
        // No session and no hash error — could be a stale tab or someone
        // visiting /members/ directly. Send to login with the same recovery
        // hint so the resend button is visible.
        window.location.href = '/members/login.html?expired=1';
        return;
      }
      const member = await getMemberProfile();
      if (!member) {
        window.location.href = '/members/login.html?expired=1';
        return;
      }
      if (member.notAMember) {
        loading.style.display = 'none';
        errorMsg.innerHTML = `The email <strong>${escHtml(member.email)}</strong> is signed in, but is not on the clan's register of members. If you believe this is an error, please write to <a href="mailto:clan@ocomain.org" style="color:var(--gold)">clan@ocomain.org</a>. Otherwise, you're welcome to <a href="/membership.html" style="color:var(--gold)">apply for membership</a>.`;
        errorBox.style.display = 'block';
        return;
      }
      renderDashboard(member);
    } catch (e) {
      console.error('dashboard error:', e);
      loading.style.display = 'none';
      errorMsg.textContent = 'Unable to load your membership details. Please try again in a moment.';
      errorBox.style.display = 'block';
    }
  })();
</script>

</body>
</html>
