            <input type="text" id="pmPostalCode" value="${escHtml(addr.postal_code || '')}" ${isPosted ? 'disabled' : ''} style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none${isPosted ? ';opacity:.6' : ''}">
          </div>
          <div>
            <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Country</label>
            <select id="pmCountry" ${isPosted ? 'disabled' : ''} style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none${isPosted ? ';opacity:.6' : ''}">
              <option value="">Select…</option>
              ${countryOptionsHtml}
            </select>
          </div>
        </div>
        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Delivery instructions — optional</label>
        <input type="text" id="pmInstructions" value="${escHtml(addr.instructions || '')}" ${isPosted ? 'disabled' : ''} style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:18px${isPosted ? ';opacity:.6' : ''}">

        <div id="pmStatus" style="display:none;padding:12px 14px;margin-bottom:16px;border-radius:1px;font-family:'EB Garamond',serif;font-size:14px"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="pmCancel" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);background:transparent;border:1px solid var(--border);padding:11px 22px;border-radius:1px;cursor:pointer">${isPosted ? 'Close' : 'Cancel'}</button>
          ${!isPosted ? '<button id="pmSave" style="font-family:\'Jost\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:12px 26px;border-radius:1px;cursor:pointer">Save address</button>' : ''}
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const close = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.getElementById('pmCancel').addEventListener('click', close);

    if (isPosted) return;

    document.getElementById('pmSave').addEventListener('click', async () => {
      const countryEl = document.getElementById('pmCountry');
      const opt = countryEl.selectedOptions[0];
      const fields = {
        recipient_name: document.getElementById('pmRecipient').value.trim(),
        line1:          document.getElementById('pmLine1').value.trim(),
        line2:          document.getElementById('pmLine2').value.trim(),
        city:           document.getElementById('pmCity').value.trim(),
        region:         document.getElementById('pmRegion').value.trim(),
        postal_code:    document.getElementById('pmPostalCode').value.trim(),
        country:        opt?.value || '',
        country_code:   opt?.dataset?.cc || '',
        instructions:   document.getElementById('pmInstructions').value.trim(),
      };
      const missing = [];
      if (!fields.recipient_name) missing.push('Addressee');
      if (!fields.line1) missing.push('Line 1');
      if (!fields.city) missing.push('City');
      if (!fields.postal_code) missing.push('Postal code');
      if (!fields.country) missing.push('Country');

      const statusEl = document.getElementById('pmStatus');
      const saveBtn = document.getElementById('pmSave');
      if (missing.length) {
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.textContent = 'Please fill: ' + missing.join(', ');
        return;
      }
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';
      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/save-postal-address', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ address: fields }),
        });
        if (!r.ok) {
          const j = await r.json().catch(() => ({}));
          throw new Error(j.error || 'Save failed');
        }
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(184,151,90,.15)';
        statusEl.style.color = 'var(--ink)';
        statusEl.textContent = 'Saved. Reloading…';
        setTimeout(() => window.location.reload(), 1000);
      } catch (e) {
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.textContent = 'Could not save — ' + (e.message || 'please try again');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save address';
      }
    });
  }

  // ── Upgrade-request modal ────────────────────────────────────────────────
  // Opened from any of the three .mupgrade-cta buttons in the dashboard
  // (Clan→Guardian, Guardian→Steward, Steward→Life). We don't run a
  // self-serve upgrade flow yet — by design, while the focus is on
  // acquiring new members rather than upselling existing ones. So this
  // modal collects an optional note, posts to /api/request-upgrade,
  // which emails clan@ocomain.org. The Chief / Office of the Private
  // Secretary then handles the change-of-tier in Stripe manually and
  // follows up by email.
  const TARGET_TIER_LABELS = {
    guardian: 'Guardian of the Clan',
    steward:  'Steward of the Clan',
    life:     'Life Member',
  };
  function openUpgradeModal(targetTier) {
    const targetLabel = TARGET_TIER_LABELS[targetTier];
    if (!targetLabel) return;
    const existing = document.getElementById('upgradeModal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'upgradeModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(12,26,12,.82);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;overflow-y:auto';

    modal.innerHTML = `
      <div style="max-width:520px;width:100%;background:var(--cream);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:36px 36px 32px;border-radius:2px;max-height:90vh;overflow-y:auto">
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Upgrade request</div>
        <h3 style="font-family:'EB Garamond',serif;font-size:24px;color:var(--ink);font-weight:400;line-height:1.2;margin:0 0 10px">Request to become a ${escHtml(targetLabel)}</h3>
        <p style="font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 22px">We don't run a self-serve upgrade yet — when you send this request, the Office of the Private Secretary will be in touch by email within a few days to walk through the next step.</p>

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Anything to add — optional</label>
        <textarea id="upModalNote" rows="4" placeholder="Anything you'd like to add — or leave blank" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;margin-bottom:18px"></textarea>

        <div id="upModalStatus" style="display:none;padding:12px 14px;margin-bottom:16px;border-radius:1px;font-family:'EB Garamond',serif;font-size:14px"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="upModalCancel" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);background:transparent;border:1px solid var(--border);padding:11px 22px;border-radius:1px;cursor:pointer">Cancel</button>
          <button id="upModalSend" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:12px 26px;border-radius:1px;cursor:pointer">Send request</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const close = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.getElementById('upModalCancel').addEventListener('click', close);

    document.getElementById('upModalSend').addEventListener('click', async () => {
      const sendBtn = document.getElementById('upModalSend');
      const cancelBtn = document.getElementById('upModalCancel');
      const statusEl = document.getElementById('upModalStatus');
      const noteEl = document.getElementById('upModalNote');
      const note = (noteEl.value || '').trim();

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';
      statusEl.style.display = 'none';

      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/request-upgrade', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ targetTier, note }),
        });
        if (!r.ok) {
          const j = await r.json().catch(() => ({}));
          throw new Error(j.error || 'Request failed');
        }
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(184,151,90,.15)';
        statusEl.style.color = 'var(--ink)';
        statusEl.innerHTML = 'Request sent ✓ The Office of the Private Secretary will be in touch by email within a few days.';
        noteEl.disabled = true;
        sendBtn.style.display = 'none';
        cancelBtn.textContent = 'Close';
      } catch (e) {
        console.error('upgrade request failed:', e);
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.innerHTML = 'Could not send — ' + escHtml(e.message || 'please try again, or write to clan@ocomain.org');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send request';
      }
    });
  }

  // ── Obituary submission modal ────────────────────────────────────────────
  // Replaces the earlier mailto: link on the Submit-an-Obituary card with
  // a structured form. Sends to /api/submit-obituary, which emails
  // clan@ocomain.org. Photograph is handled out-of-band — the Office of
  // the Private Secretary triages the submission and replies to the
  // member to request the portrait. When volume justifies, this can
  // grow into a moderation queue + auto-render onto /patrons.
  function openObituaryModal() {
    const existing = document.getElementById('obitModal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'obitModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(12,26,12,.82);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;overflow-y:auto';

    modal.innerHTML = `
      <div style="max-width:560px;width:100%;background:var(--cream);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:36px 36px 32px;border-radius:2px;max-height:90vh;overflow-y:auto">
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Memorial entry</div>
        <h3 style="font-family:'EB Garamond',serif;font-size:24px;color:var(--ink);font-weight:400;line-height:1.2;margin:0 0 10px">Submit an obituary</h3>
        <p style="font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 22px">A loved one remembered forever in the clan's online roll at <em style="color:var(--ink);font-style:italic">ocomain.org/patrons</em>. Attach a portrait photograph below if you have one to hand — otherwise the Office of the Private Secretary will reply by email to ask.</p>

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Their full name</label>
        <input type="text" id="obitName" placeholder="Their full name" maxlength="160" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:14px">

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Relationship to you</label>
        <input type="text" id="obitRelationship" placeholder="Mother, father, uncle, grandparent…" maxlength="80" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:14px">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div>
            <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Born — optional</label>
            <input type="text" id="obitBorn" placeholder="Place and date" maxlength="200" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none">
          </div>
          <div>
            <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Died — optional</label>
            <input type="text" id="obitDied" placeholder="Place and date" maxlength="200" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none">
          </div>
        </div>

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">A few lines about them</label>
        <textarea id="obitTribute" rows="6" placeholder="80–120 words. What they loved, what they gave, how they will be remembered." maxlength="1500" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;resize:vertical;line-height:1.6;margin-bottom:18px"></textarea>

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Portrait photograph — optional</label>
        <input type="file" id="obitPhoto" accept="image/*" style="display:none">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px">
          <button type="button" id="obitPhotoChoose" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);background:var(--white);border:1px solid var(--gold-border);padding:11px 18px;border-radius:1px;cursor:pointer">Choose photo</button>
          <span id="obitPhotoLabel" style="font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--ink-muted);line-height:1.4">JPEG, PNG or HEIC · under 4 MB</span>
          <button type="button" id="obitPhotoRemove" style="display:none;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);background:transparent;border:none;padding:0;cursor:pointer;text-decoration:underline">Remove</button>
        </div>
        <div id="obitPhotoError" style="display:none;font-family:'EB Garamond',serif;font-size:13px;font-style:italic;color:#922c1f;margin:6px 0 0"></div>
        <div style="margin-bottom:18px"></div>

        <div id="obitStatus" style="display:none;padding:12px 14px;margin-bottom:16px;border-radius:1px;font-family:'EB Garamond',serif;font-size:14px"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="obitCancel" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);background:transparent;border:1px solid var(--border);padding:11px 22px;border-radius:1px;cursor:pointer">Cancel</button>
          <button id="obitSend" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:12px 26px;border-radius:1px;cursor:pointer">Submit entry</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const close = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.getElementById('obitCancel').addEventListener('click', close);

    // ── Photo upload handler ─────────────────────────────────────────────
    // Optional. If the member attaches a portrait, we read it as base64
    // client-side and ship it inside the JSON payload to be attached to
    // the Resend email (matches lib/publication-email.js pattern). 4 MB
    // raw cap keeps us safely under the Netlify function payload limit
    // after the ~33% base64 inflation.
    let obitPhotoData = null;
    const MAX_PHOTO_BYTES = 4 * 1024 * 1024;
    const obitPhotoInput = document.getElementById('obitPhoto');
    const obitPhotoChoose = document.getElementById('obitPhotoChoose');
    const obitPhotoRemove = document.getElementById('obitPhotoRemove');
    const obitPhotoLabel = document.getElementById('obitPhotoLabel');
    const obitPhotoError = document.getElementById('obitPhotoError');
    const PHOTO_LABEL_DEFAULT = 'JPEG, PNG or HEIC · under 4 MB';
    const showPhotoError = (msg) => {
      obitPhotoError.textContent = msg;
      obitPhotoError.style.display = 'block';
    };
    obitPhotoChoose.addEventListener('click', () => obitPhotoInput.click());
    obitPhotoRemove.addEventListener('click', () => {
      obitPhotoData = null;
      obitPhotoInput.value = '';
      obitPhotoLabel.style.color = 'var(--ink-muted)';
      obitPhotoLabel.style.fontStyle = 'italic';
      obitPhotoLabel.textContent = PHOTO_LABEL_DEFAULT;
      obitPhotoRemove.style.display = 'none';
      obitPhotoError.style.display = 'none';
    });
    obitPhotoInput.addEventListener('change', () => {
      obitPhotoError.style.display = 'none';
      const f = obitPhotoInput.files && obitPhotoInput.files[0];
      if (!f) return;
      if (!f.type || !f.type.startsWith('image/')) {
        showPhotoError('Please choose an image file (JPEG, PNG, HEIC).');
        obitPhotoInput.value = '';
        return;
      }
      if (f.size > MAX_PHOTO_BYTES) {
        showPhotoError('Photo is too large. Please choose a file under 4 MB.');
        obitPhotoInput.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = String(reader.result || '').split(',')[1] || '';
        obitPhotoData = {
          filename: f.name || 'portrait',
          contentType: f.type,
          dataBase64: base64,
        };
        obitPhotoLabel.style.color = 'var(--ink)';
        obitPhotoLabel.style.fontStyle = 'normal';
        const sizeMb = (f.size / 1024 / 1024).toFixed(1);
        obitPhotoLabel.textContent = '✓ ' + (f.name || 'portrait') + ' (' + sizeMb + ' MB)';
        obitPhotoRemove.style.display = 'inline';
      };
      reader.onerror = () => {
        showPhotoError('Could not read this file. Please try another.');
        obitPhotoInput.value = '';
        obitPhotoData = null;
      };
      reader.readAsDataURL(f);
    });

    document.getElementById('obitSend').addEventListener('click', async () => {
      const sendBtn = document.getElementById('obitSend');
      const cancelBtn = document.getElementById('obitCancel');
      const statusEl = document.getElementById('obitStatus');
      const fields = {
        subjectName:  document.getElementById('obitName').value.trim(),
        relationship: document.getElementById('obitRelationship').value.trim(),
        born:         document.getElementById('obitBorn').value.trim(),
        died:         document.getElementById('obitDied').value.trim(),
        tribute:      document.getElementById('obitTribute').value.trim(),
      };
      if (obitPhotoData) fields.photo = obitPhotoData;
      const missing = [];
      if (!fields.subjectName)  missing.push('their full name');
      if (!fields.relationship) missing.push('relationship');
      if (!fields.tribute)      missing.push('a few lines of tribute');
      if (missing.length) {
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.textContent = 'Please fill in: ' + missing.join(', ') + '.';
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = obitPhotoData ? 'Sending photo…' : 'Sending…';
      statusEl.style.display = 'none';

      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/submit-obituary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify(fields),
        });
        if (!r.ok) {
          const j = await r.json().catch(() => ({}));
          throw new Error(j.error || 'Request failed');
        }
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(184,151,90,.15)';
        statusEl.style.color = 'var(--ink)';
        statusEl.innerHTML = obitPhotoData
          ? 'Submitted ✓ The Office of the Private Secretary will be in touch by email to confirm the entry.'
          : 'Submitted ✓ The Office of the Private Secretary will reply by email to ask for the portrait photograph.';
        ['obitName','obitRelationship','obitBorn','obitDied','obitTribute'].forEach(id => {
          const el = document.getElementById(id); if (el) el.disabled = true;
        });
        obitPhotoChoose.disabled = true;
        obitPhotoRemove.style.display = 'none';
        sendBtn.style.display = 'none';
        cancelBtn.textContent = 'Close';
      } catch (e) {
        console.error('obituary submit failed:', e);
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.innerHTML = 'Could not send — ' + escHtml(e.message || 'please try again, or write to clan@ocomain.org');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Submit entry';
      }
    });
  }

  // ── Clan-story submission modal ──────────────────────────────────────────
  // Opened from the Steward+ Share-Your-Story card. Replaces the earlier
  // mailto: link with a structured form. Sends to /api/submit-clan-story,
  // which emails clan@ocomain.org. Stories are editorial — each one
  // needs human curation before lifting onto /clan-stories — so this
  // is a submission to a queue, not an auto-publish. The Office of the
  // Private Secretary triages, the Chief reviews, the Private Secretary
  // replies to confirm and request the portrait, then it's published.
  function openClanStoryModal() {
    const existing = document.getElementById('storyModal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'storyModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(12,26,12,.82);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;overflow-y:auto';

    modal.innerHTML = `
      <div style="max-width:560px;width:100%;background:var(--cream);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:36px 36px 32px;border-radius:2px;max-height:90vh;overflow-y:auto">
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Clan Stories</div>
        <h3 style="font-family:'EB Garamond',serif;font-size:24px;color:var(--ink);font-weight:400;line-height:1.2;margin:0 0 10px">Share your story</h3>
        <p style="font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 22px">Your dedicated acknowledgement on the clan's public Stories page at <em style="color:var(--ink);font-style:italic">ocomain.org/clan-stories</em>. The Office of the Private Secretary will reply by email to confirm the piece and ask for a portrait photograph.</p>

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Your full name — for the byline</label>
        <input type="text" id="storyName" placeholder="As you'd like it to appear on the page" maxlength="160" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:14px">

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Where you live — optional</label>
        <input type="text" id="storyLocation" placeholder="City, country" maxlength="160" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:14px">

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Your lineage — optional</label>
        <input type="text" id="storyLineage" placeholder="Cummins line, traces to Ennistymon 1840s" maxlength="280" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;margin-bottom:14px">

        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">A few lines about you and the clan</label>
        <textarea id="storyText" rows="6" placeholder="80–120 words. Why you joined, what the clan means to your family, how you found your way home." maxlength="1500" style="width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:16px;padding:12px 14px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;resize:vertical;line-height:1.6;margin-bottom:18px"></textarea>

        <div id="storyStatus" style="display:none;padding:12px 14px;margin-bottom:16px;border-radius:1px;font-family:'EB Garamond',serif;font-size:14px"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="storyCancel" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);background:transparent;border:1px solid var(--border);padding:11px 22px;border-radius:1px;cursor:pointer">Cancel</button>
          <button id="storySend" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:12px 26px;border-radius:1px;cursor:pointer">Submit story</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const close = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.getElementById('storyCancel').addEventListener('click', close);

    document.getElementById('storySend').addEventListener('click', async () => {
      const sendBtn = document.getElementById('storySend');
      const cancelBtn = document.getElementById('storyCancel');
      const statusEl = document.getElementById('storyStatus');
      const fields = {
        storytellerName: document.getElementById('storyName').value.trim(),
        location:        document.getElementById('storyLocation').value.trim(),
        lineage:         document.getElementById('storyLineage').value.trim(),
        story:           document.getElementById('storyText').value.trim(),
      };
      const missing = [];
      if (!fields.storytellerName) missing.push('your full name');
      if (!fields.story)           missing.push('a few lines of story');
      if (missing.length) {
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.textContent = 'Please fill in: ' + missing.join(', ') + '.';
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';
      statusEl.style.display = 'none';

      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/submit-clan-story', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify(fields),
        });
        if (!r.ok) {
          const j = await r.json().catch(() => ({}));
          throw new Error(j.error || 'Request failed');
        }
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(184,151,90,.15)';
        statusEl.style.color = 'var(--ink)';
        statusEl.innerHTML = 'Submitted ✓ The Office of the Private Secretary will reply by email to confirm and ask for the portrait photograph.';
        ['storyName','storyLocation','storyLineage','storyText'].forEach(id => {
          const el = document.getElementById(id); if (el) el.disabled = true;
        });
        sendBtn.style.display = 'none';
        cancelBtn.textContent = 'Close';
      } catch (e) {
        console.error('clan-story submit failed:', e);
        statusEl.style.display = 'block';
        statusEl.style.background = 'rgba(192,57,43,.08)';
        statusEl.style.color = '#922c1f';
        statusEl.innerHTML = 'Could not send — ' + escHtml(e.message || 'please try again, or write to clan@ocomain.org');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Submit story';
      }
    });
  }

  function escHtml(t) {
    return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  (async () => {
    try {
      // If the magic-link return URL contains an auth error (expired token,
      // already-used link, etc.), Supabase puts the error code in the hash.
      // Detect that BEFORE waiting for a session — there won't be one — and
      // forward to the login page with an `expired=1` flag so it can offer
      // a one-click resend instead of forcing the member to retype email.
      const hash = window.location.hash || '';
      if (hash.includes('error=') || hash.includes('error_code=')) {
        window.location.href = '/members/login.html?expired=1';
        return;
      }

      // Wait for session to be established from URL hash (magic-link return)
      await new Promise(r => setTimeout(r, 200));
      const session = await currentSession();
      if (!session) {
        // No session and no hash error — could be a stale tab or someone
        // visiting /members/ directly. Send to login with the same recovery
        // hint so the resend button is visible.
        window.location.href = '/members/login.html?expired=1';
        return;
      }
      const member = await getMemberProfile();
      if (!member) {
        window.location.href = '/members/login.html?expired=1';
        return;
      }
      if (member.notAMember) {
        // Admins (e.g. clan@ocomain.org) sign in via the same magic-
        // link flow as members but have no row in the members table.
        // Without this branch they'd land on the regular dashboard
        // and see 'is not on the clan's register of members' — which
        // is technically true but unhelpful. Redirect them to the
        // admin tool. The allowlist mirrors the server-side
        // FOUNDER_ADMIN_ALLOWLIST in lib/supabase.js (kept small;
        // duplicating one canonical value is acceptable). The admin
        // page itself does its own server-side auth check, so this
        // client-side hint is just for UX, not security.
        const ADMIN_EMAILS = new Set(['clan@ocomain.org']);
        const signedInEmail = (member.email || '').toLowerCase().trim();
        if (ADMIN_EMAILS.has(signedInEmail)) {
          window.location.href = '/members/admin/founders.html';
          return;
        }
        loading.style.display = 'none';
        errorMsg.innerHTML = `The email <strong>${escHtml(member.email)}</strong> is signed in, but is not on the clan's register of members. If you believe this is an error, please write to <a href="mailto:clan@ocomain.org" style="color:var(--gold)">clan@ocomain.org</a>. Otherwise, you're welcome to <a href="/membership.html" style="color:var(--gold)">apply for membership</a>.`;
        errorBox.style.display = 'block';
        return;
      }
      renderDashboard(member);

      // Analytics: member_signed_in. Fires only AFTER the dashboard
      // renders successfully — i.e. the auth + member-info round-trip
      // succeeded and we have a real member record. The 'welcome'
      // dimension flags first-time post-signup arrivals (?welcome=member,
      // ?welcome=gift, ?welcome=founder) vs returning visits, so the
      // funnel can isolate genuine first-paid-conversion sessions from
      // routine member sign-ins. Tier dimension lets us see which
      // tiers retain best.
      try {
        if (typeof umami !== 'undefined' && umami.track) {
          var welcome = (new URLSearchParams(window.location.search).get('welcome') || '').trim();
          umami.track('member_signed_in', {
            tier: member.tier || 'unknown',
            family: !!member.tier_family,
            welcome_kind: welcome || 'returning',
          });
        }
      } catch (e) { /* never break the dashboard */ }

      // Clear any invite-attribution token now that this user is
      // confirmed as a member. The token did its job on the way in
      // (Stripe webhook stamped invitations.converted_member_id from
      // session.metadata.invite_token); this is purely client-side
      // hygiene so a later visit / fresh invitation to the same
      // browser doesn't carry stale attribution. Idempotent — safe
      // to call even if no token was set.
      try {
        if (window.ocomainInvite && typeof window.ocomainInvite.clear === 'function') {
          window.ocomainInvite.clear();
        }
      } catch (e) { /* non-fatal */ }
    } catch (e) {
      console.error('dashboard error:', e);
      loading.style.display = 'none';
      errorMsg.textContent = 'Unable to load your membership details. Please try again in a moment.';
      errorBox.style.display = 'block';
    }
  })();
</script>

</body>
</html>
