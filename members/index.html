<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members' Area — Clan Ó Comáin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="stylesheet" href="/shared.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    body{background:var(--cream);min-height:100vh}
    /* Header strip */
    .mhdr{background:var(--ink);border-bottom:2px solid var(--gold);padding:18px 0}
    .mhdr-inner{max-width:1040px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .mhdr-brand{display:flex;align-items:center;gap:14px;text-decoration:none}
    .mhdr-brand img{height:38px;width:auto}
    .mhdr-brand-text{font-family:'EB Garamond',serif;font-size:20px;color:var(--gold-pale)}
    .mhdr-brand-text em{color:var(--gold-light);font-style:italic}
    .mhdr-nav{display:flex;align-items:center;gap:22px}
    .mhdr-nav a{font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(184,151,90,.7);text-decoration:none}
    .mhdr-nav a:hover{color:var(--gold-light)}
    .mhdr-signout{font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(215,235,215,.55);background:transparent;border:1px solid rgba(184,151,90,.25);padding:8px 14px;border-radius:1px;cursor:pointer}
    .mhdr-signout:hover{color:var(--gold-light);border-color:var(--gold)}

    /* Main */
    .mmain{max-width:1040px;margin:0 auto;padding:60px 24px 80px}
    .mwelcome{text-align:center;margin-bottom:48px}
    .mwelcome-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
    .mwelcome-title{font-family:'EB Garamond',serif;font-size:clamp(30px,4.5vw,46px);font-weight:400;color:var(--ink);line-height:1.1;margin-bottom:12px}
    .mwelcome-title em{color:var(--gold);font-style:italic}
    .mwelcome-sub{font-family:'EB Garamond',serif;font-size:17px;font-style:italic;color:var(--ink-soft);max-width:600px;margin:0 auto;line-height:1.7}

    /* Status card — the "your membership" panel */
    .mstatus{max-width:720px;margin:0 auto 40px;background:var(--white);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:36px 40px;border-radius:2px;box-shadow:0 6px 24px rgba(12,26,12,.06)}
    .mstatus-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:0;padding-bottom:18px;border-bottom:1px solid var(--border)}
    .mstatus-head-label{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .mstatus-head-tier{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);margin-top:2px}
    /* FOUNDER BAND — honour ribbon for members who joined in the founding
       window (currently {2026}). Sits between the membership head and the
       data rows. Borrows the cert's typographic elements ('YEAR ONE OF
       THE REVIVAL' eyebrow + 'Founder · YYYY' title) but laid out flat
       and horizontal for the screen — explicitly NOT a copy of the
       circular cert seal. Thin gold rules on either side give it the
       air of a stamped ribbon without the literal circle/embossing. */
    .mfounder-band{
      display:flex;align-items:center;justify-content:center;gap:18px;
      padding:18px 24px;margin:18px 0 0;
      background:linear-gradient(180deg,rgba(184,151,90,.04),rgba(184,151,90,.07) 50%,rgba(184,151,90,.04));
      border-radius:1px;
    }
    .mfounder-rule{flex:1 1 0;max-width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-border),var(--gold),var(--gold-border),transparent)}
    .mfounder-content{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
    .mfounder-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:var(--gold)}
    .mfounder-title{font-family:'EB Garamond',serif;font-size:24px;color:var(--gold-strong,#A47A2C);letter-spacing:.04em;line-height:1}
    .mfounder-title em{font-style:italic;font-weight:500;color:var(--gold)}
    .mfounder-sep{margin:0 12px;color:rgba(184,151,90,.5);font-style:normal;font-size:.85em;vertical-align:.08em}
    @media (max-width:520px){
      .mfounder-band{padding:16px 14px;gap:10px}
      .mfounder-rule{max-width:32px}
      .mfounder-title{font-size:19px}
      .mfounder-sep{margin:0 8px}
    }
    .mbadge{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:5px 10px;border-radius:1px}
    .mbadge.active{background:rgba(160,180,100,.18);color:#556B1F;border:1px solid rgba(160,180,100,.4)}
    .mbadge.lapsed{background:rgba(210,150,80,.18);color:#8F5E1B;border:1px solid rgba(210,150,80,.4)}
    .mbadge.cancelled{background:rgba(180,180,180,.18);color:#666;border:1px solid rgba(180,180,180,.4)}
    .mstatus-rows{display:grid;grid-template-columns:1fr 1fr;gap:20px 32px;margin-top:24px}
    @media (max-width:520px){.mstatus-rows{grid-template-columns:1fr}}
    .mstatus-row-label{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px}
    .mstatus-row-value{font-family:'EB Garamond',serif;font-size:17px;color:var(--ink)}

    /* Gift panel — only renders when member.gift is present. Permanent
       "this membership was a gift from [giver]" card, with the personal
       message quoted so the recipient can return to it any time. */
    .mgift{max-width:720px;margin:0 auto 26px;background:var(--cream-dark);border:1px solid var(--gold-border);border-left:3px solid var(--gold);padding:28px 30px;border-radius:0 2px 2px 0;box-shadow:0 4px 14px rgba(12,26,12,.04)}
    .mgift-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .mgift-title{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:6px}
    .mgift-title em{color:var(--gold);font-style:italic}
    .mgift-meta{font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--ink-muted);margin-bottom:16px}
    .mgift-message{font-family:'EB Garamond',serif;font-size:16px;color:var(--ink-soft);line-height:1.8;margin:0;padding:16px 0 0;border-top:1px solid var(--gold-border);white-space:pre-wrap}
    .mgift-message::before{content:'"';font-family:'EB Garamond',serif;font-size:38px;color:var(--gold);line-height:0;position:relative;top:14px;margin-right:6px}

    /* Cert-not-yet-confirmed prompt — prominent gold border card at top of
       dashboard. Stronger visual treatment than the family/gift cards
       because it represents a real action item with a 30-day deadline. */
    .mcert-prompt{max-width:720px;margin:0 auto 26px;background:linear-gradient(180deg,rgba(184,151,90,.12) 0%,rgba(184,151,90,.04) 100%);border:1.5px solid var(--gold);border-top:3px solid var(--gold);padding:30px 32px 28px;border-radius:2px;box-shadow:0 6px 20px rgba(184,151,90,.18);text-align:center}
    .mcert-prompt-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-strong);margin-bottom:12px}
    .mcert-prompt-title{font-family:'EB Garamond',serif;font-size:26px;color:var(--ink);font-weight:400;line-height:1.25;margin-bottom:14px}
    .mcert-prompt-title em{color:var(--gold);font-style:italic}
    .mcert-prompt-body{font-family:'EB Garamond',serif;font-size:16px;color:var(--ink-soft);line-height:1.7;margin:0 auto 22px;max-width:520px}
    .mcert-prompt-body strong{color:var(--ink);font-weight:500}
    .mcert-prompt-btn{display:inline-block;font-family:'Jost',sans-serif;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:14px 30px;border-radius:1px;cursor:pointer;transition:background .2s}
    .mcert-prompt-btn:hover{background:var(--gold-light)}
    .mcert-prompt-deadline{font-family:'Jost',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);margin:0 0 18px}
    /* Urgent (≤7 days): inverted treatment — dark ink background, gold accents.
       Same card structure, more visual weight. */
    .mcert-prompt-urgent{background:linear-gradient(180deg,var(--ink) 0%,#0a160a 100%);border-color:var(--gold);box-shadow:0 8px 28px rgba(184,151,90,.28)}
    .mcert-prompt-urgent .mcert-prompt-eyebrow{color:var(--gold-strong)}
    .mcert-prompt-urgent .mcert-prompt-title{color:var(--cream)}
    .mcert-prompt-urgent .mcert-prompt-title em{color:var(--gold)}
    .mcert-prompt-urgent .mcert-prompt-body{color:rgba(248,244,236,.78)}
    .mcert-prompt-urgent .mcert-prompt-body strong{color:var(--cream)}
    .mcert-prompt-urgent .mcert-prompt-deadline{color:var(--gold)}

    /* Sealed-cert card — appears in place of mcert-prompt once the cert is
       published. A cert is a one-time heraldic instrument: there is no
       editing post-publish, only download. Matches mcert-prompt dimensions
       so the dashboard reads as the same shape transitioning from
       "Action required" → "Sealed". Calmer treatment: no urgency colours,
       no countdown, just the cert's identity + download. */
    .mcert-sealed{max-width:720px;margin:0 auto 26px;background:var(--white);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:32px 36px 30px;border-radius:2px;box-shadow:0 4px 18px rgba(12,26,12,.05);text-align:center}
    .mcert-sealed-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
    .mcert-sealed-title{font-family:'EB Garamond',serif;font-size:28px;color:var(--ink);font-weight:400;line-height:1.2;margin-bottom:6px}
    .mcert-sealed-title em{color:var(--gold);font-style:italic}
    .mcert-sealed-meta{font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-muted);margin:0 0 22px;line-height:1.5}
    .mcert-sealed-btn{display:inline-block;font-family:'Jost',sans-serif;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:14px 30px;border-radius:1px;cursor:pointer;transition:background .2s}
    .mcert-sealed-btn:hover{background:var(--gold-light)}
    .mcert-sealed-btn:disabled{opacity:.6;cursor:default}

    /* Family panel — only renders for Family-tier members. Two roles: shows
       current family details + provides a single edit/manage CTA that opens
       a small modal/form on the dashboard. Same visual language as the gift
       card so they sit side-by-side coherently. */
    .mfam{max-width:720px;margin:0 auto 26px;background:var(--white);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:28px 30px;border-radius:2px}
    .mfam-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .mfam-title{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:14px}
    .mfam-title em{color:var(--gold);font-style:italic}
    .mfam-list{font-family:'EB Garamond',serif;font-size:16px;color:var(--ink-soft);line-height:1.8;margin:0 0 18px}
    .mfam-list .mfam-row{display:flex;gap:10px;align-items:baseline;margin-bottom:6px}
    .mfam-list .mfam-row-label{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);min-width:90px;flex-shrink:0}
    .mfam-list .mfam-row-value{color:var(--ink)}
    .mfam-empty{font-family:'EB Garamond',serif;font-size:15px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 18px}

    /* Postal address card — Guardian+ tiers, mirrors mfam visual treatment */
    .mpostal{max-width:720px;margin:0 auto 26px;background:var(--white);border:1px solid var(--gold-border);border-top:3px solid var(--gold);padding:28px 30px;border-radius:2px}
    .mpostal-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .mpostal-title{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:14px}
    .mpostal-title em{color:var(--gold);font-style:italic}
    .mpostal-empty{font-family:'EB Garamond',serif;font-size:15px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 16px}
    .mpostal-address{font-family:'EB Garamond',serif;font-size:16px;color:var(--ink-soft);line-height:1.7;background:var(--cream);padding:16px 20px;border-left:3px solid var(--gold);border-radius:0 2px 2px 0;margin:0 0 8px}
    .mpostal-note{font-family:'EB Garamond',serif;font-size:13px;font-style:italic;color:var(--ink-muted);line-height:1.6;margin:0}
    .mfam-edit-btn{display:inline-block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-strong);background:transparent;border:1px solid var(--gold);padding:10px 22px;border-radius:1px;text-decoration:none;cursor:pointer;transition:all .2s}
    .mfam-edit-btn:hover{background:rgba(184,151,90,.08)}

    /* Privacy / Public Register card — separate concern from family details
       because individual members may have privacy preferences too. Visible
       to ALL members, family or not. */
    .mpriv{max-width:720px;margin:0 auto 26px;background:var(--white);border:1px solid var(--border);padding:24px 28px;border-radius:2px}
    .mpriv-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
    .mpriv-title{font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:12px}
    .mpriv-row{display:flex;align-items:flex-start;gap:12px;font-family:'EB Garamond',serif;font-size:15px;color:var(--ink-soft);line-height:1.55;margin-bottom:10px}
    .mpriv-row input{margin-top:4px;width:16px;height:16px;cursor:pointer;flex-shrink:0}
    .mpriv-note{font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--ink-muted);margin:8px 0 0;line-height:1.6}
    .mpriv-status{font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--ink-muted);margin-top:10px;min-height:18px}

    /* Invite-a-friend section. Same layout family as .mpriv but
       with a form-grid inside. */
    .minvite{max-width:720px;margin:0 auto 26px;background:var(--white);border:1px solid var(--border);border-top:3px solid var(--gold);padding:24px 28px;border-radius:2px}
    .minvite-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
    .minvite-title{font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);font-weight:400;line-height:1.3;margin-bottom:8px}
    .minvite-sub{font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-muted);line-height:1.65;margin:0 0 18px;max-width:540px}
    /* Unified action toggle — two equal-segment buttons inside one
       gold-bordered pill. Active segment gets solid gold + dark ink;
       inactive is transparent with gold text. Click switches which
       panel is visible (JS at bottom of file). */
    .munified-toggle{display:flex;border:1px solid var(--gold);border-radius:1px;overflow:hidden;max-width:100%;margin:0 0 22px}
    .munified-toggle-btn{flex:1;background:transparent;border:0;border-right:1px solid var(--gold);font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--gold-deep);padding:13px 14px;cursor:pointer;transition:background .15s,color .15s;line-height:1.3}
    .munified-toggle-btn:last-child{border-right:0}
    .munified-toggle-btn.active{background:var(--gold);color:var(--ink)}
    .munified-toggle-btn:not(.active):hover{background:rgba(184,151,90,.08)}
    .munified-panel[hidden]{display:none}
    .minvite-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .minvite-field-full{grid-column:1 / -1}
    .minvite-label{display:block;font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);margin:0 0 6px}
    .minvite-input,.minvite-textarea{width:100%;box-sizing:border-box;font-family:'EB Garamond',serif;font-size:15.5px;padding:10px 12px;background:var(--white);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);outline:none;transition:border-color .15s}
    .minvite-input:focus,.minvite-textarea:focus{border-color:var(--gold)}
    .minvite-textarea{resize:vertical;line-height:1.5;min-height:48px}
    .minvite-help{font-family:'EB Garamond',serif;font-size:13px;font-style:italic;color:var(--ink-muted);margin:6px 0 0;line-height:1.55}
    .minvite-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:6px}
    .minvite-send-btn{font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--white);background:#6B1F1F;border:1px solid #4A1010;padding:11px 24px;border-radius:1px;cursor:pointer;transition:background .15s}
    .minvite-send-btn:hover{background:#4A1010}
    .minvite-send-btn:disabled{opacity:.55;cursor:wait}
    .minvite-status{font-family:'EB Garamond',serif;font-size:14.5px;line-height:1.6;padding:12px 14px;border-radius:1px;margin-top:14px;display:none}
    .minvite-status.show{display:block}
    .minvite-status.success{background:rgba(184,151,90,.12);border-left:3px solid var(--gold);color:var(--ink-soft)}
    .minvite-status.error{background:rgba(107,31,31,.07);border-left:3px solid #6B1F1F;color:#4A1010}
    .minvite-status.warn{background:rgba(184,151,90,.16);border-left:3px solid #8B6F32;color:var(--ink-soft)}
    @media (max-width:580px){
      .minvite-grid{grid-template-columns:1fr}
    }
    /* Upgrade card perks list — used in the clan-tier 'Two more benefits
       await as a Guardian' panel. Same visual register as the gift-tier
       perks on /membership.html: gold ✦ marker + serif body, comfortable
       line-height, generous gap between items. */
    .mupgrade{background:linear-gradient(180deg,rgba(184,151,90,.04),rgba(184,151,90,.02))}
    .mupgrade-perks{list-style:none;padding:0;margin:6px 0 0}
    .mupgrade-perk{display:flex;align-items:flex-start;gap:14px;font-family:'EB Garamond',serif;font-size:15px;color:var(--ink-soft);line-height:1.65;margin-bottom:10px}
    .mupgrade-perk:last-child{margin-bottom:0}
    .mupgrade-perk-mark{flex-shrink:0;color:var(--gold);font-size:14px;line-height:1.65;margin-top:1px}
    .mupgrade-perk-body{flex:1}

    /* Action cards */
    .mactions{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
    /* Action cards now carry a 3px gold top accent + an SVG icon
       above the eyebrow. The accent matches the heraldic 'frame'
       used on the cert-publish modal and the welcome.html
       gift/invite cards — gives the dashboard's exploration grid
       a unified visual language with the rest of the clan's
       chrome rather than reading as plain content boxes. */
    .maction{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--gold);padding:30px 26px 24px;border-radius:2px;text-align:center;transition:border-color .2s,transform .15s,box-shadow .2s;display:flex;flex-direction:column;align-items:center}
    .maction.live:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 14px rgba(184,151,90,.10)}
    .maction.live:hover{border-top-color:var(--gold-deep)}
    /* Icon sits at the top of the card. 44×44 viewport (matches
       the welcome.html precedent), gold stroke 1.4, no fill. */
    .maction-icon{display:block;margin:0 auto 14px;width:44px;height:44px;flex-shrink:0}
    .maction-icon svg{display:block;width:100%;height:100%}
    .maction-eyebrow{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .maction.coming .maction-eyebrow{color:rgba(184,151,90,.55)}
    .maction-title{font-family:'EB Garamond',serif;font-size:19px;color:var(--ink);margin-bottom:10px;line-height:1.25}
    .maction-desc{font-family:'EB Garamond',serif;font-size:13.5px;color:var(--ink-soft);line-height:1.65;margin-bottom:16px;flex:1}
    .maction-btn{display:inline-block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:var(--gold);padding:10px 20px;border-radius:1px;text-decoration:none;border:0;cursor:pointer;align-self:center}
    .maction-btn:hover{background:var(--gold-light)}
    .maction-btn.secondary{background:transparent;color:var(--gold);border:1px solid var(--gold)}
    .maction-btn:disabled,.maction.coming .maction-btn{opacity:.5;cursor:not-allowed;background:rgba(184,151,90,.15);color:rgba(12,26,12,.5)}

    /* Gift section — sits between the invite section and the action
       grid, mirroring how welcome.html pairs invite + gift as the
       'two ways to bring others to the clan'. Single card centred
       below the invite section, restrained but visually distinct
       (3px gold top accent matching the action cards, larger icon
       than the inline action cards because this is its own moment). */
    .mgift-cta{max-width:720px;margin:0 auto 36px;background:var(--white);border:1px solid var(--gold-faint);border-top:3px solid var(--gold);padding:34px 36px;border-radius:2px;text-align:center;transition:border-color .2s,transform .15s,box-shadow .2s}
    .mgift-cta:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 14px rgba(184,151,90,.10);border-top-color:var(--gold-deep)}
    .mgift-cta-icon{display:block;margin:0 auto 16px;width:48px;height:48px}
    .mgift-cta-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .mgift-cta-title{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);margin-bottom:10px;line-height:1.3}
    .mgift-cta-desc{font-family:'EB Garamond',serif;font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 auto 20px;max-width:520px;font-style:italic}
    .mgift-cta-btn{display:inline-block;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);padding:13px 28px;border-radius:1px;text-decoration:none}
    .mgift-cta-btn:hover{background:var(--gold-light)}
    .mgift-cta-note{font-family:'Jost',sans-serif;font-size:11px;font-weight:400;letter-spacing:.08em;color:rgba(12,26,12,.45);margin-top:14px}

    /* The Order of Honours — repositioned 2026-04-28 from a 'bridge'
       between invite/gift to a leading ceremonial block above the
       unified action card. Restyled to match the heritage register
       used on /members/honours.html: white card with gold-top border
       (same family as .minvite below, so the two stack as a
       connected composition), italic burgundy 'Order of Honours'
       title, small ornamental flourish below the title. The eyebrow
       borrows the 'In the clan's keeping' phrasing from honours.html
       so members read this and feel they are entering the same
       institutional vocabulary they'll find on the deeper page.
       Tight bottom margin (12px) lets the small visual ornament
       below it bridge to the action card. */
    .mhonours-bridge{max-width:720px;margin:0 auto 12px;background:var(--white);border:1px solid var(--gold-faint);border-top:3px solid var(--gold);padding:32px 36px 28px;border-radius:2px}
    .mhonours-bridge-head{text-align:center;margin-bottom:18px}
    .mhonours-bridge-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
    .mhonours-bridge-title{font-family:'EB Garamond',serif;font-size:30px;font-weight:400;color:var(--ink);line-height:1.15;margin:0 0 14px;letter-spacing:-0.005em}
    .mhonours-bridge-title em{font-style:italic;color:var(--burgundy)}
    /* Ornamental flourish — three small dots in gold, a restrained
       Irish-manuscript-style decorative break. Not a heavy heraldic
       device; the dignity titles themselves carry the ceremony. */
    .mhonours-bridge-flourish{font-family:'EB Garamond',serif;color:var(--gold);font-size:14px;letter-spacing:0.6em;line-height:1;opacity:0.65;display:inline-block;padding-left:0.6em}
    .mhonours-bridge-body{font-family:'EB Garamond',serif;font-size:15.5px;color:var(--ink-soft);line-height:1.8;text-align:left}
    .mhonours-bridge-body em{color:var(--burgundy);font-style:italic}
    /* Dignity ladder — three rows, hairline gold dividers, baseline-aligned.
       Designed as a clean ceremonial reference table, not a feature grid:
       no badges, no checkmarks, no progress bar. The status line beneath
       carries the personal "you are here" without needing visual markers
       in the ladder itself. */
    .mhonours-ladder{margin:20px 0 18px;border-top:1px solid var(--gold-border);border-bottom:1px solid var(--gold-border)}
    .mhonours-rank{display:flex;justify-content:space-between;align-items:baseline;padding:13px 2px;border-bottom:1px solid var(--gold-border);gap:18px}
    .mhonours-rank:last-child{border-bottom:none}
    .mhonours-rank-name{font-family:'EB Garamond',serif;font-size:20px;font-style:italic;color:var(--burgundy)}
    .mhonours-rank-req{font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);white-space:nowrap}
    .mhonours-status{margin:0 0 18px;font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-soft);line-height:1.7;text-align:center}
    .mhonours-bridge-link{display:inline-block;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--gold);padding:13px 28px;border-radius:1px;text-decoration:none;margin-top:6px;transition:background .15s}
    .mhonours-bridge-link:hover{background:var(--gold-light)}
    .mhonours-bridge-cta{text-align:center}
    /* Centered ornament that sits BETWEEN the honours box and the
       action card below. Small gold diamond flanked by short gold
       hairlines — visually unites the two cards as a composition
       rather than two unrelated items. ~30px tall, tight margins.
       Pure CSS via flex, no SVG or unicode dependency. */
    .mflourish-link{max-width:720px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--gold);opacity:0.55;height:18px}
    .mflourish-link::before,.mflourish-link::after{content:'';display:block;width:32px;height:1px;background:var(--gold)}
    .mflourish-link span{display:inline-block;width:6px;height:6px;background:var(--gold);transform:rotate(45deg)}

    /* Loading / error states */
    .mloading,.merror{text-align:center;padding:120px 24px;font-family:'EB Garamond',serif;color:var(--ink-soft);font-size:17px}
    .merror{color:var(--ink)}
    .merror .btn{margin-top:20px;display:inline-block;background:var(--gold);color:var(--ink);font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:14px 28px;border-radius:1px;text-decoration:none}

    @media(max-width:640px){
      .mhdr-inner{flex-wrap:wrap}
      .mhdr-nav{gap:14px}
      .mstatus{padding:26px 22px;margin-left:12px;margin-right:12px}
    }
  </style>
</head>
<body>

<div class="mhdr">
  <div class="mhdr-inner">
    <a href="/" class="mhdr-brand">
      <img src="/coat_of_arms.png" alt="Ó Comáin">
      <span class="mhdr-brand-text">Clan <em>Ó Comáin</em></span>
    </a>
    <div class="mhdr-nav">
      <a href="/">Clan website</a>
      <button class="mhdr-signout" id="signOutBtn">Sign out</button>
    </div>
  </div>
</div>

<main class="mmain">
  <div class="mloading" id="loadingState">Loading your membership details…</div>
  <div id="dashboardContent" style="display:none"></div>
  <div id="errorState" style="display:none" class="merror">
    <p id="errorMessage">Something went wrong.</p>
    <a href="/members/login.html" class="btn">Return to sign in →</a>
  </div>
</main>

<!-- Gaelic name converter — classic script so it can register on
     window. Used by the publish modal's name field to suggest Irish
     forms of the member's first name and (clan-adjacent) surname. -->
<script src="./gaelic-name-converter.js"></script>

<script type="module">
  import { currentSession, getMemberProfile, signOut } from './auth.js';

  const loading   = document.getElementById('loadingState');
  const dashboard = document.getElementById('dashboardContent');
  const errorBox  = document.getElementById('errorState');
  const errorMsg  = document.getElementById('errorMessage');
  const signOutBtn = document.getElementById('signOutBtn');

  signOutBtn.addEventListener('click', signOut);

  // Format a timestamp as "17 April 2026"
  function fmtDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  // Format "First name" from full name, fallback to email username
  function firstName(member) {
    if (member.name) return member.name.split(' ')[0];
    return member.email.split('@')[0];
  }

  function renderDashboard(member) {
    const tierLabel = member.tier_label || 'Clan Member';
    const statusBadge = {
      active:    '<span class="mbadge active">Active</span>',
      lapsed:    '<span class="mbadge lapsed">Lapsed</span>',
      cancelled: '<span class="mbadge cancelled">Cancelled</span>',
    }[member.status] || `<span class="mbadge">${member.status}</span>`;

    const isLife = (member.tier || '').startsWith('life');
    const renewalValue = isLife ? 'For life · no renewal' : fmtDate(member.expires_at);
    // Founder badge gating — must match FOUNDING_YEARS in lib/generate-cert.js.
    // Add years here in lock-step with the cert when extending the founding
    // window (currently 2026 only — see commentary in generate-cert.js).
    const FOUNDING_YEARS_DASH = new Set([2026]);
    const joinYear = member.joined_at ? new Date(member.joined_at).getFullYear() : null;
    const isFounder = joinYear && FOUNDING_YEARS_DASH.has(joinYear);
    // Horizontal Founder band — lives between the membership head and the
    // data rows, in the white space the user pointed at. Borrows the
    // cert's typographic elements (the 'YEAR ONE OF THE REVIVAL' eyebrow
    // and the 'Founder · YYYY' title) but lays them out flat for the
    // screen rather than copying the seal literally. Subtle warm cream
    // tint background + thin gold rules give it the air of an honour
    // ribbon stamped onto the membership record.
    const founderBand = isFounder ? `
      <div class="mfounder-band" role="note" aria-label="Founding member ${joinYear}">
        <span class="mfounder-rule"></span>
        <span class="mfounder-content">
          <span class="mfounder-eyebrow">Year One of the Revival</span>
          <span class="mfounder-title"><em>Founding Member</em><span class="mfounder-sep">·</span>${joinYear}</span>
        </span>
        <span class="mfounder-rule"></span>
      </div>
    ` : '';
    // Comped-by-chief notation. Renders ONLY for members whose row was
    // created by Fergus's founder admin tool (column comped_by_chief
    // added in migration 013). Members-only — never appears on the
    // public register, never in any email signature. A quiet
    // acknowledgement of the distinct origin of their membership.
    // Sits just under the founder band so it reads as a subordinate
    // attribution to the founder status. Italic, smaller, gold —
    // dignified rather than loud.
    const heraldNote = member.comped_by_chief ? `
      <div style="text-align:center;font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--gold-deep);margin:-6px 0 18px;letter-spacing:0.005em" role="note">
        Founding Member by warrant of the Chief
      </div>
    ` : '';
    // Cert published = the cert PDF exists and has been sealed. Both
    // cert_published_at (canonical) and cert_locked_at (legacy alias)
    // are set together at publication; checking either works.
    const isPublished = !!(member.cert_published_at || member.cert_locked_at);
    // Edit button row for the unpublished cert-details / family card. Once
    // published, the card itself is removed from the dashboard (a cert is
    // a one-time heraldic instrument — no editing post-publish), so this
    // row is only ever rendered while !isPublished.
    const certActionRow = (editLabel) => `
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:4px">
        <button class="mfam-edit-btn" id="mfamEditBtn">${editLabel} →</button>
      </div>
    `;

    // Title-aware welcome heading. When the member holds a
    // sponsorship title (Cara/Onóir/Ardchara), the greeting reads
    // 'Dia dhuit, Cara Antóin' with the title styled IDENTICALLY
    // to the first name — both inside a single <em> so the burgundy
    // italic colouring applies to the whole address. Mirrors the
    // 'Sir John' chivalric salutation form used in the email
    // greetings (sponsor letter, title-bestowal letter, renewal
    // email). Untitled members see 'Dia dhuit, Antóin' as before.
    const heldTitle = member.sponsorTitle;
    const greetingAddress = heldTitle
      ? `${heldTitle.irish} ${firstName(member)}`
      : firstName(member);

    dashboard.innerHTML = `
      <div class="mwelcome">
        <div class="mwelcome-eyebrow">Welcome home</div>
        <h1 class="mwelcome-title">Dia dhuit, <em>${escHtml(greetingAddress)}</em></h1>
        <p class="mwelcome-sub">Your place in the Register of Clan Ó Comáin is confirmed. This is where the clan keeps its promises to you.</p>
      </div>

      <section class="mstatus">
        <div class="mstatus-head">
          <div>
            <div class="mstatus-head-label">Your membership</div>
            <div class="mstatus-head-tier">${escHtml(tierLabel)}</div>
          </div>
          ${statusBadge}
        </div>
        ${founderBand}
        ${heraldNote}
        <div class="mstatus-rows">
          <div>
            <div class="mstatus-row-label">Name on the Register</div>
            <!-- For family-tier members, display_name_on_register holds
                 the formatted family entry as it will appear on the public
                 register: 'Antoin & Aoife Commane' (couple same-surname),
                 'Antoin Commane & Aoife Smith' (couple different-surname),
                 or 'Antoin Commane & Family' (with children). It's
                 computed and stamped into the row by submit-/update-
                 family-details.js on first publish.

                 For individual-tier members, display_name_on_register
                 either equals member.name or is null (depending on whether
                 they went through the family-details path). Fall through
                 to member.name in either case.

                 Pre-publish members have display_name_on_register null —
                 we show member.name (the Herald-collected primary name)
                 until they publish, at which point this field flips to
                 the formatted family entry automatically.

                 Children opt-out does NOT affect the family-entry display
                 name itself — it controls whether children's FIRST NAMES
                 get LISTED separately under the family entry. The family
                 line ('X & Family') always shows; only the listing of
                 children's names is privacy-gated. -->
            <div class="mstatus-row-value">${escHtml(member.display_name_on_register || member.name || '—')}</div>
            <!-- Credit line — mirrors the cert PDF and the public register.
                 Same buildDashboardCredit() result the page renders with;
                 keeps all three views (cert PDF / dashboard / register) in
                 visual lock-step. Only renders for family entries that
                 have a partner and/or children to credit. Pluralization
                 ('child' vs 'children') matches lib/generate-cert.js
                 exactly. -->
            ${(() => {
              const hasPartner = !!member.partner_name;
              const hasChildrenList = Array.isArray(member.children_first_names) && member.children_first_names.length > 0;
              // The dashboard is the MEMBER'S OWN view. They always see
              // their full sealed record — partner and children — even
              // when the public-register privacy flag is set to hide
              // children's names. The privacy flag only gates what
              // appears on the PUBLIC Register render path
              // (register.js → register.html), not what the member
              // themselves sees. Was previously gated on
              // children_visible_on_register, which silently hid the
              // 'with their child Roger' line on the member's own
              // dashboard. That was wrong.
              const childCount = hasChildrenList ? member.children_first_names.length : 0;
              const childWord = childCount === 1 ? 'child' : 'children';
              const partnerFirst = hasPartner ? member.partner_name.trim().split(/\s+/).slice(0, -1).join(' ') || member.partner_name.trim() : null;
              let credit = null;
              if (hasPartner && hasChildrenList) {
                const kids = member.children_first_names;
                const formatted = kids.length === 1 ? kids[0] : kids.length === 2 ? `${kids[0]} and ${kids[1]}` : `${kids.slice(0, -1).join(', ')}, and ${kids[kids.length - 1]}`;
                credit = `with ${escHtml(partnerFirst)}, and ${escHtml(formatted)}`;
              } else if (hasPartner && !hasChildrenList) {
                credit = `with ${escHtml(partnerFirst)}`;
              } else if (!hasPartner && hasChildrenList) {
                const kids = member.children_first_names;
                const formatted = kids.length === 1 ? kids[0] : kids.length === 2 ? `${kids[0]} and ${kids[1]}` : `${kids.slice(0, -1).join(', ')}, and ${kids[kids.length - 1]}`;
                credit = `with their ${childWord} ${escHtml(formatted)}`;
              }
              return credit
                ? `<div style="font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--ink-muted);margin-top:6px;line-height:1.5">${credit}</div>`
                : '';
            })()}
          </div>
          <div>
            <div class="mstatus-row-label">Email</div>
            <div class="mstatus-row-value">${escHtml(member.email)}</div>
          </div>
          <div>
            <div class="mstatus-row-label">${isLife ? 'Duration' : 'Renews'}</div>
            <div class="mstatus-row-value">${renewalValue}</div>
          </div>
          <div>
            <div class="mstatus-row-label">Joined</div>
            <div class="mstatus-row-value">${fmtDate(member.joined_at)}</div>
          </div>
        </div>
        ${(() => {
          // ── HELD IN HONOUR row ──
          // Renders only if the member holds a sponsor title. The
          // 'Name on the Register' row above is the cert-sealed
          // identity — that's locked at publish and never carries a
          // post-cert title (Reading B: cert is the founding warrant,
          // titles are post-cert recognition).
          //
          // This separate row is where the member's HONOUR is
          // surfaced. Three lines:
          //   1. Eyebrow label 'HELD IN HONOUR' (same Jost
          //      letter-spacing as the other row labels — the
          //      visual sibling of 'Name on the Register').
          //   2. Named line 'James Cummins, Ardchara' — the honour
          //      sits as a comma-suffix to the member's regular name,
          //      mirroring how postnominals work in real heraldic
          //      registers ('John Smith, KBE'). Suffix not prefix:
          //      avoids looking like a Sir/Dame/Lord claim, and ages
          //      better as more members hold each title.
          //   3. Explanatory italic 'Recognised by the Chief in the
          //      dignity of {Title} — {English}.' Single phrasing
          //      that scales across all three tiers.
          //
          // Only the HIGHEST title held is displayed. Lower titles
          // were laid by when the member was raised — chivalric
          // replacement model, not peerage accretion. The audit
          // trail (sponsor_titles_awarded JSONB) preserves all
          // award timestamps, but only the current dignity is on
          // public/dashboard show.
          const t = member.sponsorTitle;
          if (!t) return '';
          // CRITICAL: use member.name, NOT display_name_on_register.
          // The sponsorship title attaches to the INDIVIDUAL who did
          // the inviting, not to their family unit. For family-tier
          // members whose display_name_on_register reads
          // 'John Smith & Family' or 'John & Jane Smith', the wife,
          // husband, and children do NOT earn the dignity through
          // the family membership — only the named member who holds
          // the account does. So the title-bearing line uses just
          // member.name. (Earlier draft fell through to
          // display_name_on_register and would have rendered
          // 'John Smith & Family, Cara of Ó Comáin' which is wrong.)
          const baseName = (member.name || '').trim();
          if (!baseName) return '';
          // Format: 'James Comyn, Cara of Ó Comáin' — matches the
          // canonical format used in emails and on the honours page
          // (see formatTitledName in lib/sponsor-service.js).
          return `<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--gold-border)">
          <div class="mstatus-row-label">Held in Honour</div>
          <div class="mstatus-row-value" style="margin-bottom:6px">${escHtml(baseName)}, ${escHtml(t.irish)} of Ó Comáin</div>
          <div style="font-family:'EB Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink-muted);line-height:1.6">Recognised by the Chief in the dignity of ${escHtml(t.irish)} — ${escHtml(t.english)}.</div>
        </div>`;
        })()}
      </section>

      ${member.gift ? `
      <section class="mgift">
        <div class="mgift-eyebrow">A gift to you</div>
        <div class="mgift-title">A gift from <em>${escHtml(member.gift.buyer_name || member.gift.buyer_email)}</em></div>
        <div class="mgift-meta">Given ${fmtDate(member.gift.gifted_at)}${member.gift.tier_label ? ' · ' + escHtml(member.gift.tier_label) : ''}</div>
        ${member.gift.personal_message ? `<p class="mgift-message">${escHtml(member.gift.personal_message)}</p>` : ''}
      </section>
      ` : ''}

      ${isPublished ? `
      <!-- Sealed-cert card — replaces both the publish prompt and the
           cert/family edit cards once the cert is published. A cert is a
           one-time heraldic instrument: there is no editing post-publish,
           only download. The Register at Newhall reflects the same names
           that were sealed onto the PDF; corrections after the fact are
           handled by writing to clan@ocomain.org. -->
      <section class="mcert-sealed">
        <div class="mcert-sealed-eyebrow">Your sealed certificate</div>
        <div class="mcert-sealed-title">Certificate of <em>Membership</em></div>
        <p class="mcert-sealed-meta">Issued ${fmtDate(member.cert_published_at || member.cert_locked_at)} · sealed in your name</p>
        <button class="mcert-sealed-btn" id="mfamCertDownloadBtn" type="button">Download certificate (PDF) →</button>
      </section>
      ` : (() => {
        // Days-remaining countdown to the 30-day publication deadline.
        // joined_at + 30 days = auto-publish moment. We compute days
        // remaining server-side via the member row's joined_at field
        // (more reliable than client clock).
        const joinedMs = member.joined_at ? new Date(member.joined_at).getTime() : Date.now();
        const deadlineMs = joinedMs + 30 * 24 * 60 * 60 * 1000;
        const daysRemaining = Math.max(0, Math.ceil((deadlineMs - Date.now()) / (24 * 60 * 60 * 1000)));
        const urgent = daysRemaining <= 7;
        const daysText = daysRemaining === 0
          ? 'today'
          : daysRemaining === 1
            ? '1 day remaining'
            : `${daysRemaining} days remaining`;
        return `
      <!-- Cert-not-yet-published prompt — prominent gold-border card asking
           the member to publish their cert. Replaced by mcert-sealed once
           cert_published_at is set (member published, or auto-publish at
           day 30 fired).
           Stronger visual treatment when ≤7 days remaining (urgent gold-on-ink).
      -->
      <section class="mcert-prompt${urgent ? ' mcert-prompt-urgent' : ''}">
        <div class="mcert-prompt-eyebrow">${urgent ? 'Final week — publish your certificate' : 'Action required — publish your certificate'}</div>
        <div class="mcert-prompt-title">Publish your <em>certificate</em></div>
        <p class="mcert-prompt-body">Your certificate is a one-time heraldic instrument issued in your name. Confirm how your name appears, add an optional ancestor dedication${member.tier_family ? ', and your partner and children' : ''} — then publish. <strong>Once published, the certificate is sealed.</strong></p>
        <p class="mcert-prompt-deadline">${daysText} to publish · auto-publishes ${daysRemaining === 0 ? 'imminently' : `in ${daysRemaining} day${daysRemaining === 1 ? '' : 's'}`} with the name on your record</p>
        <button class="mcert-prompt-btn" id="mcertPromptBtn">Publish my certificate →</button>
      </section>
      `;})()}

      ${!isPublished ? (member.tier_family ? `
      <section class="mfam" id="mfam-section">
        <div class="mfam-eyebrow">Your Family on the Membership</div>
        <div class="mfam-title">Family <em>recorded</em></div>
        ${(member.partner_name || (member.children_first_names && member.children_first_names.length)) ? `
          <div class="mfam-list">
            ${member.partner_name ? `
              <div class="mfam-row">
                <div class="mfam-row-label">Partner</div>
                <div class="mfam-row-value">${escHtml(member.partner_name)}</div>
              </div>
            ` : ''}
            ${(member.children_first_names && member.children_first_names.length) ? `
              <div class="mfam-row">
                <div class="mfam-row-label">Children</div>
                <div class="mfam-row-value">${member.children_first_names.map(escHtml).join(' · ')}</div>
              </div>
            ` : ''}
            ${member.ancestor_dedication ? `
              <div class="mfam-row">
                <div class="mfam-row-label">Dedication</div>
                <div class="mfam-row-value" style="font-style:italic">${escHtml(member.ancestor_dedication)}</div>
              </div>

    // ── Family edit modal (only present if Family tier) ────────────────────

    // ── Cert PDF download (published members only — button only present

    const certDownloadBtn = document.getElementById('mfamCertDownloadBtn');
    if (certDownloadBtn) {
      certDownloadBtn.addEventListener('click', async () => {
        const originalText = certDownloadBtn.textContent;
        certDownloadBtn.disabled = true;
        certDownloadBtn.textContent = 'Preparing PDF…';
        try {
          const session = await currentSession();
          if (!session) { window.location.href = '/members/login.html'; return; }
          const res = await fetch('/api/generate-certificate', {
            method: 'POST',
            headers: { Authorization: `Bearer ${session.access_token}` },
          });
          if (!res.ok) {
            const errBody = await res.json().catch(() => ({}));
            throw new Error(errBody.error || `Request failed (${res.status})`);
          }
          const { url } = await res.json();
          // Trigger download via signed URL with download= filename hint
          window.location.href = url;
          setTimeout(() => {
            certDownloadBtn.disabled = false;
            certDownloadBtn.textContent = originalText;

    // ── Privacy checkbox auto-save handlers ────────────────────────────────
    const prvPublic = document.getElementById('prvPublic');

    const prvDedication = document.getElementById('prvDedication');
    const prvDedicationWrap = document.getElementById('prvDedicationWrap');
    const prvStatus = document.getElementById('prvStatus');

    async function savePrivacy() {
      prvStatus.textContent = 'Saving…';
      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/update-family-details', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({
            publicRegisterVisible: prvPublic.checked,
            childrenVisibleOnRegister: prvChildren ? (prvChildren.checked && prvPublic.checked) : false,
            // Dedication-on-register: only meaningful if the parent
            // public-register box is ticked. Server-side gate also
            // enforces this so the column stays consistent.
            dedicationVisibleOnRegister: prvDedication ? (prvDedication.checked && prvPublic.checked) : false,
            privacyOnly: true,
          }),
        });
        if (!r.ok) throw new Error('Could not save');
        const now = new Date();
        prvStatus.textContent = `Saved at ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
      } catch (e) {
        prvStatus.textContent = 'Could not save — please try again';
        prvStatus.style.color = '#922c1f';
      }
    }

    if (prvPublic) {
      prvPublic.addEventListener('change', () => {
        const enabled = prvPublic.checked;
        // Cascade enable/disable to the children sub-toggle.
        if (prvChildren && prvChildrenWrap) {
          prvChildren.disabled = !enabled;
          prvChildrenWrap.style.opacity = enabled ? '1' : '.5';
          prvChildrenWrap.style.pointerEvents = enabled ? 'auto' : 'none';

        if (prvDedication && prvDedicationWrap) {
          prvDedication.disabled = !enabled;
          prvDedicationWrap.style.opacity = enabled ? '1' : '.5';
          prvDedicationWrap.style.pointerEvents = enabled ? 'auto' : 'none';
          if (!enabled) prvDedication.checked = false;
        }
        savePrivacy();
      });
    }
    if (prvChildren) {
      prvChildren.addEventListener('change', savePrivacy);
    }
    if (prvDedication) {
      prvDedication.addEventListener('change', savePrivacy);

    // ── Unified action card mode toggle ───────────────────────────────
    // Wires up the two-button toggle (Invite by name / Gift their first

    // panel. Toggles the .active class on the buttons (which controls
    // the gold-fill styling) and the [hidden] attribute on the two
    // .munified-panel divs (which hides/shows them). aria-selected is
    // kept in sync for screen-reader users. No analytics yet — when
    // we add them, this is the natural place to log mode_picked events
    // so we can see invite-vs-gift conversion ratios.
    document.querySelectorAll('.munified-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.getAttribute('data-mode');
        document.querySelectorAll('.munified-toggle-btn').forEach(b => {
          const isActive = b === btn;
          b.classList.toggle('active', isActive);
          b.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
        document.querySelectorAll('.munified-panel').forEach(p => {
          p.hidden = p.getAttribute('data-panel') !== mode;

    // ── Invite-a-friend form handler ────────────────────────────────────
    // Submits to /.netlify/functions/send-invitation with the auth
    // session token. Server validates + applies rate limit + dedup +
    // unsub gates; this client just renders the response.
    const inviteForm = document.getElementById('inviteForm');
    const inviteSendBtn = document.getElementById('inviteSendBtn');
    const inviteStatus = document.getElementById('inviteStatus');
    const inviteName = document.getElementById('inviteName');
    const inviteEmail = document.getElementById('inviteEmail');
    const inviteNote = document.getElementById('inviteNote');

    function setInviteStatus(klass, html) {
      inviteStatus.className = 'minvite-status show ' + klass;
      inviteStatus.innerHTML = html;
    }
    function clearInviteStatus() {
      inviteStatus.className = 'minvite-status';
      inviteStatus.innerHTML = '';
    }

    if (inviteForm) {
      inviteForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearInviteStatus();
        const name = inviteName.value.trim();
        const email = inviteEmail.value.trim().toLowerCase();
        const note = inviteNote.value.trim();
        if (!name) return setInviteStatus('error', '<strong>Please add their name.</strong>');
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          return setInviteStatus('error', "<strong>That email looks off — please double-check.</strong>");
        }
        inviteSendBtn.disabled = true;
        inviteSendBtn.textContent = 'Sending…';
        try {
          const session = await currentSession();
          if (!session) { window.location.href = '/members/login.html'; return; }
          const r = await fetch('/.netlify/functions/send-invitation', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
            body: JSON.stringify({ name, email, personal_note: note || undefined }),
          });
          const data = await r.json().catch(() => ({}));
          if (r.status === 201 && data.ok) {
            const remainingTxt = (typeof data.remaining_today === 'number')
              ? ` You have ${data.remaining_today} invitation${data.remaining_today === 1 ? '' : 's'} left today.`
              : '';
            setInviteStatus('success', `<strong>Sent.</strong> The Herald has written to ${escapeHtmlForInvite(name)}.${remainingTxt}`);
            inviteForm.reset();
          } else if (r.status === 207) {
            setInviteStatus('warn', `<strong>Recorded — but the email did not send.</strong> Please try again later or contact <a href="mailto:clan@ocomain.org" style="color:var(--gold-deep)">clan@ocomain.org</a>.`);
            inviteForm.reset();
          } else if (r.status === 409) {
            setInviteStatus('error', `<strong>Cannot send.</strong> ${escapeHtmlForInvite(data.error || 'Already invited or already a member.')}`);
          } else if (r.status === 429) {
            setInviteStatus('error', `<strong>Pause needed.</strong> ${escapeHtmlForInvite(data.error || 'Too many invitations.')}`);
          } else if (r.status === 403) {
            setInviteStatus('error', `<strong>Cannot send.</strong> ${escapeHtmlForInvite(data.error || 'Access denied.')}`);
          } else if (r.status === 400) {
            setInviteStatus('error', `<strong>Check the form.</strong> ${escapeHtmlForInvite(data.error || 'Validation failed.')}`);
          } else {
            setInviteStatus('error', `<strong>Could not send.</strong> ${escapeHtmlForInvite(data.error || 'Unknown error.')}`);
          }
        } catch (err) {
          console.error('invitation send failed:', err);
          setInviteStatus('error', `<strong>Network error.</strong> Could not reach the server.`);
        } finally {
          inviteSendBtn.disabled = false;
          inviteSendBtn.textContent = 'Send invitation →';
        }
      });
    }

    // Local escaper — the page's main escHtml is in a different

    function escapeHtmlForInvite(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    if (window.location.hash === '#minvite') {

  // ── Family details edit modal ────────────────────────────────────────────

  function openFamilyModal(member) {

    // must read the same way as the published PDF — anything else is a
    // WYSIWYG lie. Returns { displayName, creditLine } where creditLine
    // may be null (no italic line under the name on the cert).
    //
    //   partner + children -> "[name] & Family"  /  "with [partner], and [children]"
    //   partner only       -> "[John & Mary Cummins]"  /  null
    //   children only      -> "[name] & Family"  /  "with their children [children]"
    //   nothing            -> "[name]"  /  null
    const formatFamilyDisplay = (name, partner, childrenList) => {
      const hasPartner = !!(partner && partner.trim());
      const cleanChildren = Array.isArray(childrenList)
        ? childrenList.map(c => (c || '').trim()).filter(Boolean)
        : [];
      const hasChildren = cleanChildren.length > 0;

      const formatList = (names) => {
        if (names.length === 1) return names[0];
        if (names.length === 2) return names[0] + ' and ' + names[1];
        return names.slice(0, -1).join(', ') + ', and ' + names[names.length - 1];
      };

      const combineCoupleNames = (n1, n2) => {
        const t1 = n1.trim().split(/\s+/);
        const t2 = n2.trim().split(/\s+/);
        if (t1.length >= 2 && t2.length >= 2 &&
            t1[t1.length - 1].toLowerCase() === t2[t2.length - 1].toLowerCase()) {
          const first1 = t1.slice(0, -1).join(' ');
          const first2 = t2.slice(0, -1).join(' ');
          return first1 + ' & ' + first2 + ' ' + t1[t1.length - 1];
        }
        return n1.trim() + ' & ' + n2.trim();
      };

      const cleanName = (name || '').trim();
      if (hasPartner && hasChildren) {
        return { displayName: cleanName + ' & Family', creditLine: 'with ' + partner.trim() + ', and ' + formatList(cleanChildren) };
      }
      if (hasPartner && !hasChildren) {
        return { displayName: combineCoupleNames(cleanName, partner), creditLine: null };
      }
      if (!hasPartner && hasChildren) {
        // 'child' singular for one, 'children' plural for two or more.
        // Mirrors the same fix in lib/generate-cert.js — keep these
        // two implementations in lock-step.
        const childWord = cleanChildren.length === 1 ? 'child' : 'children';
        return { displayName: cleanName + ' & Family', creditLine: 'with their ' + childWord + ' ' + formatList(cleanChildren) };
      }
      return { displayName: cleanName, creditLine: null };
    };

    // Initial preview values from the loaded member row
    const initialChildren = Array.isArray(member.children_first_names) ? member.children_first_names : [];
    const initialPreview = formatFamilyDisplay(member.name || '—', member.partner_name || '', initialChildren);


    const lockedBanner = isPublished ? `
      <div style="background:rgba(184,151,90,.12);border:1px solid rgba(184,151,90,.35);border-left:3px solid var(--gold);padding:14px 18px;margin:0 0 22px;border-radius:2px">

        <p style="font-family:'EB Garamond',serif;font-size:13.5px;line-height:1.6;color:var(--ink-soft);margin:0">A cert is a one-time heraldic instrument. Yours has been published and sealed. Edits here update your entry in the Register at Newhall House but do not regenerate the PDF. To request a re-issue, please write to <a href="mailto:clan@ocomain.org" style="color:var(--gold)">clan@ocomain.org</a>.</p>

    const tierLabelClean = (member.tier_label || 'Member of the Clan').replace(/\bclan\b/i, 'Clan Ó Comáin');

    modal.innerHTML = `

        .famModalForm-col{}

          .famModalGrid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:32px;align-items:start}
          .famModalPreview-col{position:sticky;top:20px;align-self:start}
        }
      </style>
      <div class="famModalBody">
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">${isPublished ? 'Edit your record' : 'Publish your certificate'}</div>
        <h3 style="font-family:'EB Garamond',serif;font-size:24px;color:var(--ink);font-weight:400;line-height:1.2;margin:0 0 10px">${isPublished ? 'Your certificate details' : 'Confirm and publish your certificate'}</h3>
        <p style="font-family:'EB Garamond',serif;font-size:16px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin:0 0 22px">${isPublished ? 'Edits here update your entry in the Register at Newhall House. Your published cert PDF is sealed and unchanged.' : 'Refine the details below — the preview updates live. When the certificate is exactly as you want it, click Publish. Once published, it is sealed.'}</p>

        ${lockedBanner}

        ${!isPublished ? `
        <!-- TWO-COLUMN GRID (desktop) / STACKED (mobile)
             Left column: live cert preview (sticky on desktop so
             it stays visible while the right column scrolls).
             Right column: all the editable fields. Only rendered
             pre-publish — once published, there is no live preview
             to put on the left, so the modal is a single column. -->
        <div class="famModalGrid">

          <!-- LEFT COLUMN: Live preview -->
          <div class="famModalPreview-col">
        <!-- LIVE CERT PREVIEW. Pure CSS render that mirrors the
             PDF layout. Updates as the form below changes. -->
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin:0 0 10px">Live preview</div>
        <div id="famPreview" style="background:var(--white);border:1px solid var(--gold-border);box-shadow:0 4px 16px rgba(12,26,12,.06);padding:32px 28px 28px;margin:0 0 24px;border-radius:1px;text-align:center;font-family:'EB Garamond',serif">
          <!-- Coat of arms shield (matches PDF: 88pt → ~64px on screen) -->
          <img src="/coat_of_arms.png" alt="Ó Comáin" style="display:block;margin:0 auto 14px;width:64px;height:auto">
          <!-- 'IRISH CLAN' eyebrow (matches PDF small-caps gold eyebrow above the headline) -->
          <div style="font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);margin:0 0 10px">Irish Clan</div>
          <!-- 'Ó Comáin' large gold serif headline -->
          <div style="font-family:'EB Garamond',serif;font-size:32px;color:var(--gold);line-height:1;margin:0 0 6px">Ó Comáin</div>
          <div style="width:48px;height:1px;background:var(--gold);opacity:.5;margin:14px auto 16px"></div>
          <div style="font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);margin:0 0 4px">Certificate of Membership</div>
          <div style="font-family:'EB Garamond',serif;font-style:italic;font-size:12px;color:var(--gold);margin:0 0 18px">Teastas Ballraíochta</div>
          <div style="font-family:'EB Garamond',serif;font-style:italic;font-size:11px;color:var(--ink-muted);margin:0 0 6px">This is to certify that</div>
          <div id="prevName" style="font-family:'EB Garamond',serif;font-size:24px;color:var(--ink);line-height:1.25;margin:6px 0 4px">${escHtml(initialPreview.displayName)}</div>
          <div id="prevCreditLine" style="font-family:'EB Garamond',serif;font-style:italic;font-size:11.5px;color:var(--ink-muted);margin:4px 0 14px;display:${isFamilyTier && initialPreview.creditLine ? 'block' : 'none'}">${escHtml(initialPreview.creditLine || '')}</div>

        </div>
          </div>

          <!-- RIGHT COLUMN: Editable form fields -->
          <div class="famModalForm-col">
        ` : ''}

        <!-- Name on cert -->
        <label style="display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 6px">Your name on the certificate</label>
        <!-- Name input + Gaelic-suggester button. The button sits at
