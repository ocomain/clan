        revertBtn.addEventListener('click', () => {
          if (originalEnglishName !== null) {
            nameEl.value = originalEnglishName;
            nameEl.dispatchEvent(new Event('input', { bubbles: true }));
            originalEnglishName = null;
            revertBtn.style.display = 'none';
          }
        });
        // Mount the revert button next to the show-As-Gaeilge button.
        gaelicBtn.parentNode.insertBefore(revertBtn, gaelicBtn.nextSibling);

        function buildPopoverHtml() {
          const parts = G.parseName(nameEl.value);
          const firstSuggestions = G.suggestionsForFirstName(parts.firstNameRaw);
          const surnameSuggestions = G.suggestionsForSurname(parts.surnameRaw);
          // Helper to render one suggestion button. data-* attributes
          // carry both the new value AND the kind ('first'/'surname')
          // so the click handler can substitute the right token.
          const renderSugg = (s, kind) => {
            const note = s.note ? ` <span style="color:var(--ink-muted);font-style:italic">· ${escHtml(s.note)}</span>` : '';
            return `<button type="button" class="g-sug" data-kind="${kind}" data-irish="${escHtml(s.irish)}" style="display:block;width:100%;text-align:left;font-family:'EB Garamond',serif;font-size:15px;padding:10px 12px;margin:0 0 4px;background:rgba(184,151,90,.06);border:1px solid var(--gold-border);border-radius:1px;color:var(--ink);cursor:pointer;transition:background .15s" onmouseover="this.style.background='rgba(184,151,90,.14)'" onmouseout="this.style.background='rgba(184,151,90,.06)'"><strong style="font-weight:500">${escHtml(s.irish)}</strong> <span style="color:var(--ink-muted);font-size:13px">— ${escHtml(s.pronunciation)}</span>${note}</button>`;
          };

          // Build sections
          let html = `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px"><div style="font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep)">As Gaeilge — Irish forms</div><button type="button" id="famGaelicClose" style="background:transparent;border:none;color:var(--ink-muted);cursor:pointer;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.1em">Close ✕</button></div>`;

          if (firstSuggestions.length === 0 && surnameSuggestions.length === 0) {
            html += `<p style="font-family:'EB Garamond',serif;font-size:14px;font-style:italic;color:var(--ink-muted);margin:6px 0 0;line-height:1.6">No suggestions for <strong style="color:var(--ink);font-style:normal;font-weight:500">${escHtml(parts.original || '—')}</strong>. We only suggest names we're confident in — for everything else, you're welcome to write your own Irish form here.</p>`;
            return html;
          }

          if (firstSuggestions.length > 0) {
            html += `<div style="font-family:'EB Garamond',serif;font-size:13px;color:var(--ink-muted);margin:0 0 6px">First name <em>(${escHtml(parts.firstNameRaw)})</em></div>`;
            html += firstSuggestions.map(s => renderSugg(s, 'first')).join('');
          }

          if (surnameSuggestions.length > 0) {
            html += `<div style="font-family:'EB Garamond',serif;font-size:13px;color:var(--ink-muted);margin:14px 0 6px">Surname <em>(${escHtml(parts.surnameRaw)})</em> — descendant of Ó Comáin</div>`;
            html += surnameSuggestions.map(s => renderSugg(s, 'surname')).join('');
          }

          html += `<p style="font-family:'EB Garamond',serif;font-size:12.5px;font-style:italic;color:var(--ink-muted);margin:14px 0 0;line-height:1.55;border-top:1px solid var(--gold-border);padding-top:10px">Click a suggestion to substitute that part of your name. The rest of your name stays as you typed it. Pronunciations are approximate guides.</p>`;
          return html;
        }

        function openPopover() {
          gaelicPopover.innerHTML = buildPopoverHtml();
          gaelicPopover.style.display = 'block';
          // Wire suggestion-click handlers
          gaelicPopover.querySelectorAll('.g-sug').forEach(btn => {
            btn.addEventListener('click', (e) => {
              const kind = btn.dataset.kind;
              const irish = btn.dataset.irish;
              const parts = G.parseName(nameEl.value);
              const newName = kind === 'first'
                ? G.rebuildName(parts, irish, null)
                : G.rebuildName(parts, null, irish);
              // Capture the pre-substitution name on FIRST Gaelic
              // substitution. Subsequent substitutions don't overwrite
              // this — the revert button always returns to the
              // original English baseline, even if the user picked
              // multiple Gaelic forms in sequence (e.g. first the
              // first-name suggestion, then the surname suggestion).
              if (originalEnglishName === null) {
                originalEnglishName = nameEl.value;
                revertBtn.style.display = 'inline-block';
              }
              nameEl.value = newName;
              // Fire input event so the live-preview wiring updates.
              nameEl.dispatchEvent(new Event('input', { bubbles: true }));
              closePopover();
            });
          });
          const closeBtn = document.getElementById('famGaelicClose');
          if (closeBtn) closeBtn.addEventListener('click', closePopover);
        }

        function closePopover() {
          gaelicPopover.style.display = 'none';
          gaelicPopover.innerHTML = '';
        }

        gaelicBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (gaelicPopover.style.display === 'block') {
            closePopover();
          } else {
            openPopover();
          }
        });

        // Click-outside dismiss. Bound at document level; checks
        // whether the click landed inside the popover OR the button,
        // and only dismisses if neither.
        document.addEventListener('click', (e) => {
          if (gaelicPopover.style.display !== 'block') return;
          if (gaelicPopover.contains(e.target) || gaelicBtn.contains(e.target)) return;
          closePopover();
        });

        // Esc-key dismiss.
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && gaelicPopover.style.display === 'block') {
            closePopover();
          }
        });
      }
      // ── End Gaelic converter wiring ─────────────────────────────

      // Ancestor dedication: prefix chips + detail input. The saved value
      // in ancestorEl (hidden) is rebuilt as `prefix + ' ' + detail` on
      // every change. If the user picks 'Custom…', the detail field
      // becomes the entire dedication and no prefix is added.
      const ANCESTOR_PREFIXES = ['In memory of', 'In honour of', 'For', 'Custom…'];
      let activePrefix = ANCESTOR_PREFIXES[0]; // default

      // Parse a saved value back into prefix + detail for re-editing.
      // Tries each prefix in turn (longest first to avoid 'For' eating
      // 'For Bridget' AND 'In memory of For someone'). If none match,
      // treat the whole thing as Custom.
      const parseAncestor = (saved) => {
        const s = (saved || '').trim();
        if (!s) return { prefix: ANCESTOR_PREFIXES[0], detail: '' };
        const sortedPrefixes = ['In memory of', 'In honour of', 'For']
          .sort((a, b) => b.length - a.length);
        for (const p of sortedPrefixes) {
          if (s.toLowerCase().startsWith(p.toLowerCase() + ' ')) {
            return { prefix: p, detail: s.slice(p.length + 1).trim() };
          }
          if (s.toLowerCase() === p.toLowerCase()) {
            return { prefix: p, detail: '' };
          }
        }
        return { prefix: 'Custom…', detail: s };
      };

      // Render chips with current selection highlighted. Re-rendered on
      // every selection change to swap the active styling.
      const renderChips = () => {
        chipsWrap.innerHTML = ANCESTOR_PREFIXES.map(p => {
          const active = (p === activePrefix);
          const baseStyle = "font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:.06em;padding:8px 14px;border-radius:1px;cursor:pointer;border:1px solid;transition:all .15s;user-select:none";
          const activeStyle = ";background:var(--gold);color:var(--white);border-color:var(--gold)";
          const inactiveStyle = ";background:var(--white);color:var(--ink-soft);border-color:var(--gold-border)";
          return `<button type="button" data-prefix="${escHtml(p)}" style="${baseStyle}${active ? activeStyle : inactiveStyle}">${escHtml(p)}</button>`;
        }).join('');
        // Wire each chip
        chipsWrap.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            activePrefix = btn.getAttribute('data-prefix');
            renderChips();
            recomputeAncestor();
            // Re-evaluate the duplicate-prefix detector since the
            // active chip may now match (or no longer match) a
            // prefix the user typed into the detail field.
            if (typeof updateAncestorMeta === 'function') updateAncestorMeta();
            // For 'Custom…', refocus the detail field so the user
            // immediately writes the full line. Adjust placeholder for
            // clarity.
            if (activePrefix === 'Custom…') {
              ancestorDetailEl.placeholder = 'Write the entire dedication line as you want it printed';
            } else {
              ancestorDetailEl.placeholder = 'my grandfather, Patrick Cummins of Ennistymon, 1908\u20131984';
            }
            ancestorDetailEl.focus();
          });
        });
      };

      // Recombine prefix + detail into the hidden saved value, then
      // refresh the preview. Empty detail = empty saved value (no
      // dedication shown on cert).
      const recomputeAncestor = () => {
        const detail = (ancestorDetailEl.value || '').trim();
        let combined = '';
        if (detail) {
          combined = (activePrefix === 'Custom…')
            ? detail
            : (activePrefix + ' ' + detail);
        }
        ancestorEl.value = combined;
        updatePreview();
      };

      // Initialise from any existing saved value (re-edit case)
      const parsed = parseAncestor(member.ancestor_dedication || '');
      activePrefix = parsed.prefix;
      ancestorDetailEl.value = parsed.detail;
      if (activePrefix === 'Custom…') {
        ancestorDetailEl.placeholder = 'Write the entire dedication line as you want it printed';
      }
      renderChips();

      const updatePreview = () => {
        const nameVal = (nameEl?.value || '').trim() || '—';
        const partnerVal = (partnerEl?.value || '').trim();
        const childrenVal = (childrenEl?.value || '').split('\n').map(s => s.trim()).filter(Boolean);

        if (prevAncestor) {
          const v = (ancestorEl?.value || '').trim();
          prevAncestor.textContent = v;
          prevAncestor.style.display = v ? 'block' : 'none';
        }

        // Drive both prevName and prevCreditLine from the same helper that
        // generate-cert.js uses, so the preview matches the published PDF
        // exactly. Family-only feature — for individual tier the credit
        // line stays hidden and the name renders plain.
        if (isFamilyTier) {
          const out = formatFamilyDisplay(nameVal, partnerVal, childrenVal);
          if (prevName) prevName.textContent = out.displayName;
          if (prevCreditLine) {
            if (out.creditLine) {
              prevCreditLine.textContent = out.creditLine;
              prevCreditLine.style.display = 'block';
            } else {
              prevCreditLine.style.display = 'none';
            }
          }
        } else {
          if (prevName) prevName.textContent = nameVal;
          if (prevCreditLine) prevCreditLine.style.display = 'none';
        }
      };

      nameEl?.addEventListener('input', updatePreview);
      ancestorDetailEl?.addEventListener('input', recomputeAncestor);

      // Live character counter + duplicate-prefix detector. Counter
      // updates on every keystroke. The counter goes amber-then-red
      // as the user approaches the limit, giving them visual warning
      // before the hard cap hits.
      //
      // Duplicate-prefix detection: when a chip is active (e.g.
      // 'In memory of') AND the user has typed text starting with the
      // same phrase ('In memory of my father…'), flag it so the
      // user can fix it before sealing. Was a real bug in the wild —
      // a member produced a cert printed with 'In memory of In
      // memory of my father …' because they typed the prefix
      // themselves not realising the chip would prepend it.
      const ancestorCounterEl = document.getElementById('famModalAncestorCounter');
      const updateAncestorMeta = () => {
        const detail = (ancestorDetailEl?.value || '');
        const len = detail.length;
        const max = 100;
        if (ancestorCounterEl) {
          ancestorCounterEl.textContent = `${len} / ${max}`;
          // Colour transitions: muted < 70%, amber 70-90%, red 90-100%
          const ratio = len / max;
          ancestorCounterEl.style.color = ratio < 0.7
            ? 'var(--ink-muted)'
            : ratio < 0.9 ? 'var(--gold-deep)' : '#922c1f';
        }
        // Duplicate prefix detection (only meaningful for non-Custom).
        // The list intentionally covers BOTH British and American
        // spellings ('honour' / 'honor'), bare forms ('Memory of',
        // 'Honor of'), and the most common informal alternatives
        // ('Remembering', 'In remembrance of'). A real-world member
        // (chip 'In honour of' active) typed 'In honor of …' into
        // the detail field — the detector missed it because its
        // earlier prefix list was 'In memory of, In honour of, For'
        // only and didn't include the US spelling.
        const knownPrefixes = [
          'In memory of',
          'In honour of', 'In honor of',
          'Memory of', 'Honour of', 'Honor of',
          'In remembrance of', 'Remembering',
          'For',
        ];
        const startsWithChipText = activePrefix !== 'Custom…'
          && detail.trim().toLowerCase().startsWith(activePrefix.toLowerCase() + ' ');
        // Also catch the case where they typed a DIFFERENT prefix
        // than the chip (e.g. chip 'In honour of' + typed 'In honor of …')
        const startsWithAnyPrefix = activePrefix !== 'Custom…'
          && knownPrefixes.some(p => detail.trim().toLowerCase().startsWith(p.toLowerCase() + ' '));
        if (startsWithChipText || startsWithAnyPrefix) {
          ancestorDetailEl.style.borderColor = '#922c1f';
          if (ancestorCounterEl) {
            ancestorCounterEl.textContent = `Don't repeat the prefix — the chip above already adds it (${len} / ${max})`;
            ancestorCounterEl.style.color = '#922c1f';
          }
        } else {
          ancestorDetailEl.style.borderColor = 'var(--gold-border)';
        }
      };
      ancestorDetailEl?.addEventListener('input', updateAncestorMeta);
      // Initial render — covers the re-edit case where a saved value
      // is parsed back into the field.
      updateAncestorMeta();
      partnerEl?.addEventListener('input', updatePreview);
      childrenEl?.addEventListener('input', updatePreview);
      updatePreview(); // initial render
    }

    /**
     * Detect if a name field looks like it contains multiple people
     * rather than one person's full name. Two-people-on-one-cert is
     * not allowed: individual tier is for one primary grantee, and
     * family tier records partner/children in separate fields. The
     * SINGLE name field should always contain ONE person's name —
     * even if that name has many middle names ('John Patrick Anthony
     * Smith') or unusual punctuation ('Mary O'Connor', 'Anne-Marie
     * van der Berg').
     *
     * Detection looks for the specific connectors that almost always
     * indicate two people glued together:
     *   - Ampersand   ('John & Mary Smith')
     *   - Plus sign   ('John + Mary')
     *   - Slash       ('John / Mary Smith')
     *   - Word 'and'  ('John and Mary Smith') — surrounded by spaces
     *
     * Does NOT trigger on:
     *   - Multiple words alone (middle names)
     *   - Hyphenated names ('Anne-Marie', 'Smith-Jones')
     *   - Apostrophes ('O'Connor')
     *   - Mac/Mc surnames ('MacDonald', 'McCarthy')
     *   - Dutch/Irish multi-word surnames ('van der Berg', 'O'Connor')
     *   - Comma — deliberately NOT a trigger, as it's a legitimate
     *     single-person construct for post-nominals ('John Smith, OBE',
     *     'James Smith, PhD'). Mirrors the server-side helper in
     *     lib/name-format.js.
     *
     * Returns true if the input looks like multiple people.
     */
    function looksLikeMultipleNames(name) {
      if (!name || typeof name !== 'string') return false;
      const s = name.trim();
      if (!s) return false;
      // Punctuation connectors — any of these signals 'two people'.
      // Comma is deliberately NOT here (post-nominals).
      if (/[&+/]/.test(s)) return true;
      // Word 'and' as a connector — must be surrounded by whitespace
      // on both sides AND have alphabetic content on both sides. The
      // word-boundary regex ensures we don't false-positive on names
      // like 'Anders' or 'Ferdinand'.
      if (/\b\s+and\s+\b/i.test(' ' + s + ' ')) {
        // Must have at least one capital-letter word on each side of
        // 'and' to look like two names rather than one phrase. Defensive
        // — false positive on something like 'Land and Sea' would be a
        // weird name but still possible.
        const parts = s.split(/\s+and\s+/i);
        if (parts.length >= 2 && parts.every(p => /^[A-Z]/.test(p.trim()))) {
          return true;
        }
      }
      return false;
    }

    document.getElementById('famModalSave').addEventListener('click', async () => {
      // ── Multi-name detection (pre-submit) ──
      // Catches accidents where someone types 'John & Mary Smith' or
      // 'John and Mary Smith' into the single primary-name field. The
      // sponsorship title attaches to ONE primary grantee — multiple
      // names in this slot would corrupt the cert AND any future title
      // record. Soft warning: detect, ask, let them confirm if they
      // really mean it (very rare false positive — e.g. someone who
      // genuinely has 'and' in their legal name).
      const nameInputEl = document.getElementById('famModalName');
      const nameValue = nameInputEl ? nameInputEl.value.trim() : '';
      if (looksLikeMultipleNames(nameValue)) {
        // Tier-aware message. Family tier has dedicated partner/
        // children fields; individual tier doesn't have anywhere
        // else to put a second name — they'd need to upgrade tier.
        const isFamilyTier = !!member.tier_family;
        const guidance = isFamilyTier
          ? 'The certificate names ONE primary member. If you want to add a partner or family, please use the partner and children fields below — leave this field as your own name only.'
          : 'An individual-tier certificate names ONE person. If you wish to record a partner or family, that requires a Family-tier membership.';
        const proceed = confirm(
          `The name "${nameValue}" looks like it contains more than one person.\n\n${guidance}\n\nIf this really is one person\u2019s name and we have it wrong, click OK to proceed anyway. For special cases (e.g. legal name with \u201cand\u201d in it), you can also write to clan@ocomain.org.`
        );
        if (!proceed) return;
      }

      // ── Children: full-name-not-first-name detection (pre-submit) ──
      // The instruction in the form ('Children under 18 — first names,
      // one per line' + the explanatory italic line) tells members to
      // enter only the first name, but it's not enforced — and we've
      // had at least one entry in the wild ('Brenna Máire Davis')
      // come through as 3 tokens, ending up on both the cert AND the
      // public Register as the child's full legal name.
      //
      // Detection heuristic: any child entry with 3+ whitespace tokens
      // is suspicious. 2 tokens we accept (compound first names like
      // 'Mary Anne' / 'Sarah Jane' are common); 3+ almost always means
      // first + middle + surname. Soft warning — like the parent-name
      // check above, member can override if they really mean it (e.g.
      // a child with an unusually long compound first name like
      // 'Mary Anne Catherine').
      const childrenInputEl = document.getElementById('famModalChildren');
      const childrenRaw = childrenInputEl ? childrenInputEl.value.trim() : '';
      if (childrenRaw) {
        const childEntries = childrenRaw.split(/[\n,]/).map(s => s.trim()).filter(Boolean);
        const suspicious = childEntries.filter(c => c.split(/\s+/).length >= 3);
        if (suspicious.length > 0) {
          // List the offending entries so the member sees exactly
          // what we're asking about. Pluralisation matched.
          const list = suspicious.map(s => `"${s}"`).join(', ');
          const proceed = confirm(
            `The following ${suspicious.length === 1 ? 'entry looks' : 'entries look'} like ${suspicious.length === 1 ? 'a full name' : 'full names'} rather than first ${suspicious.length === 1 ? 'name' : 'names'}: ${list}.\n\nThe Register and certificate are designed to show your children's first names only — the family surname is already carried in your own entry, and full legal names are kept private.\n\nClick OK to use ${suspicious.length === 1 ? 'this entry' : 'these entries'} as written, or Cancel to go back and shorten ${suspicious.length === 1 ? 'it' : 'them'} to just the first name.`
          );
          if (!proceed) return;
        }
      }

      // ── Ancestor dedication: hard validation at submit ──
      // Same lesson as children-as-first-names — surface a real
      // problem rather than letting it slip through. Two checks:
      //   1) Length cap mirrors the field's maxlength (100). Defends
      //      against any path that might bypass the input constraint
      //      (paste-with-extension, browser quirks, older saved
      //      values from before the cap).
      //   2) Duplicate prefix — when a chip is selected AND the
      //      detail starts with that same prefix or a different
      //      known prefix, the cert prints the prefix twice. This
      //      was the Mindy Crowley bug that prompted these checks.
      const ancestorInputEl = document.getElementById('famModalAncestor');
      const ancestorRaw = ancestorInputEl ? ancestorInputEl.value.trim() : '';
      if (ancestorRaw) {
        if (ancestorRaw.length > 100) {
          alert(`Your dedication is ${ancestorRaw.length} characters. Please shorten it to 100 characters or fewer — the certificate prints the dedication on a single italic line, and longer text will not fit.\n\nYour current text:\n"${ancestorRaw}"`);
          return;
        }
        // Duplicate-prefix check on the COMBINED value. Looks for
        // 'In memory of In memory of …' / 'In honour of In honor of …'
        // / 'In honour of For …' etc. Same wider prefix list as the
        // live detector — both British and American spellings, bare
        // forms, and common informal alternatives. Real-world bug:
        // member sealed with 'In honour of In honor of my grandfather…'
        // because the chip was 'In honour of' (British) but they typed
        // the American spelling 'In honor of …' into the detail field,
        // and the earlier 3-item prefix list missed the US variant.
        const knownPrefixes = [
          'In memory of',
          'In honour of', 'In honor of',
          'Memory of', 'Honour of', 'Honor of',
          'In remembrance of', 'Remembering',
          'For',
        ];
        for (const p of knownPrefixes) {
          const lcd = ancestorRaw.toLowerCase();
          // 'In memory of in memory of …' or any other prefix
          // immediately following the chip prefix.
          for (const q of knownPrefixes) {
            if (lcd.startsWith((p + ' ' + q + ' ').toLowerCase())) {
              alert(`Your dedication starts with "${p} ${q}" — the prefix is duplicated. Please remove the second one before sealing so the certificate reads as you want it.\n\nYour current text:\n"${ancestorRaw}"`);
              return;
            }
          }
        }
      }

      // Two-step ceremony for the FIRST publish (one-time, irreversible).
      // Subsequent saves (already-published members editing register only)
      // skip the ceremony — they go straight to save.
      if (!isPublished) {
        await runPublishCeremony();
        return;
      }
      await runSave();
    });

    /**
     * Step 1 of publish ceremony: a deliberate confirmation overlay inside
     * the existing modal. Calm, ceremonial language, single primary action.
     * The user has to actively choose to seal — no accidental publishes.
     * Clicking 'Yes — seal my certificate' kicks off step 2 (the sealing
     * animation) which then runs the actual save.
     */
    async function runPublishCeremony() {
      // CRITICAL: capture every form field's value BEFORE we replace the
      // modal's innerHTML. Once card.innerHTML = ... fires, the form
      // input elements no longer exist in the DOM, and runSave can no
      // longer read them — which silently drops the user's edits.
      // (This was a regression that lost the name edit, the ancestor
      // dedication, and the family field changes during the ceremonial
      // step. Fix: snapshot all four fields here as a frozen object.)
      const formSnapshot = readModalFormValues();

      // Build the overlay. The modal body is now styled via the
      // .famModalBody CSS class (introduced for the desktop two-column
      // layout) — selecting by class is more robust than the previous
      // inline-style selector ('div[style*="max-width:680px"]'), which
      // broke when the inline width was moved into a media-query rule.
      const card = modal.querySelector('.famModalBody');
      const original = card.innerHTML;
      // Compute the FULL family display the same way the live preview
      // does, so this confirmation step shows what will actually be
      // sealed on the cert. Was previously just rendering the bare
      // primary name ('Peter Commane') instead of the full family
      // line ('Peter Commane & Family' + 'with their child Roger').
      // The preview already used formatFamilyDisplay; this screen
      // didn't, and they diverged. Now they match.
      const sealNameFromForm = formSnapshot.name || (member.name || '');
      const sealPartner = formSnapshot.partner || (member.partner_name || '');
      const sealChildren = Array.isArray(formSnapshot.children) && formSnapshot.children.length
        ? formSnapshot.children
        : (Array.isArray(member.children_first_names) ? member.children_first_names : []);
      const sealDisplay = formatFamilyDisplay(sealNameFromForm, sealPartner, sealChildren);
      const ancestorVal = formSnapshot.ancestor;
      card.innerHTML = `
        <!-- Herald-led ceremonial confirmation. The Clan Herald is the
             anonymous figure who guided the member through the chat on
             join-chat.html — keeper of the clan's register, voice of its
             ancient tradition. His visual signature there is the clan
             shield (coat_of_arms.png) used as his avatar; we carry that
             same persona into the seal moment so the experience feels
             continuous: the Herald who entered your name at the gate is
             the same Herald who now seals it.

             Note: this is NOT Mícheál Ó Comáin (the historical Herald of
             Arms profiled on coat-of-arms.html) — he's a real figure
             outside the clan. Our Clan Herald is a website persona. -->
        <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;text-align:center">A one-time act</div>
        <h3 style="font-family:'EB Garamond',serif;font-size:30px;color:var(--ink);font-weight:400;line-height:1.2;margin:0 0 22px;text-align:center">The Herald awaits your <em style="color:var(--gold)">word</em></h3>

        <!-- The Clan Herald speaks. Voice register echoes his opening
             line on join-chat.html: 'Dia dhuit — God be with you. I am
             the Clan Herald of Ó Comáin, keeper of the clan's register
             and voice of its ancient tradition.' We open the same way
             here so the seal moment feels like the natural close of
             that conversation, with the same Herald.

             Visual signature: heraldic-stamp / wax-seal aesthetic
             (gold gradient roundel with double impression rings and
             the shield embossed into it) rather than the dark-ink
             chat-bubble treatment used in join-chat. The chat avatar
             reads as 'speaker'; the seal-roundel reads as 'official
             instrument' — which is what we want at the moment of
             sealing the cert. -->
        <div style="display:flex;gap:20px;align-items:flex-start;background:var(--cream-mid);border:1px solid var(--border);border-left:3px solid var(--gold);padding:24px 26px;margin:0 auto 28px;max-width:560px;border-radius:0 2px 2px 0">
          <!-- Heraldic stamp — wax-seal aesthetic with an embossed 'Ó'
               monogram. The Ó is uniquely identifying to the clan name
               (Ó Comáin) and visually distinct without using the shield
               artwork. Inline SVG so it's a single self-contained
               element with all decoration baked in.

               Composition (inside-out):
                 1. Gold radial-gradient roundel (light source top-left,
                    bronze depths at the rim) — the wax body.
                 2. Highlight arc across the upper edge — simulates
                    light catching a raised surface.
                 3. Outer impression ring + inner impression ring — the
                    double concentric lines characteristic of pressed
                    seals / heraldic stamps.
                 4. Eight ornamental dots evenly spaced between the
                    rings — filigree/pearl decoration.
                 5. Embossed 'Ó' monogram via two stacked text elements:
                    a light highlight beneath, the dark glyph above,
                    1px offset → 'pressed into wax' effect. -->
          <!-- Heraldic stamp — burgundy wax-impression seal,
               matched to the seal used on /register so the visual
               signature of 'the Herald' is consistent across the
               members area, the Register page, and the cert PDF.
               One Herald, one seal.

               Composition (inside-out):
                 1. Burgundy radial-gradient ellipse — the wax body
                    (lit top-left, deepening to near-black at rim)
                 2. Soft highlight arc across the upper edge —
                    light catching a raised pressed surface
                 3. Subtle turbulence-noise overlay (waxGrain
                    filter) — texture so the wax doesn't read as
                    flat plastic
                 4. Outer impression ring + Latin legend ring
                    around the perimeter ('SIGILLUM · CLAN Ó
                    COMÁIN · NEWHALL HOUSE · CO. CLARE')
                 5. Inner impression ring around the monogram
                 6. Twin filigree stars (✦) at top and bottom
                 7. Embossed 'Ó' monogram via two stacked text
                    elements: light highlight beneath, dark glyph
                    above, 1.5px offset → 'pressed into wax'

               Sized smaller than the Register version (78×78 vs
               140×140) since this is a chat-bubble-adjacent
               element, not a hero. Latin legend reads the same
               but at a smaller font-size scaled to the smaller
               circumference. Ids prefixed 'cerm' so they cannot
               clash with anything else on the page. -->
          <svg viewBox="0 0 140 140" style="flex-shrink:0;width:78px;height:78px;display:block;filter:drop-shadow(0 4px 10px rgba(20,5,5,.3)) drop-shadow(0 1px 3px rgba(40,10,10,.2))" aria-hidden="true">
            <defs>

          <div style="font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);text-align:center;line-height:1.3">${escHtml(sealDisplay.displayName)}</div>

          ${ancestorVal ? `<div style="font-family:'EB Garamond',serif;font-style:italic;font-size:14.5px;color:var(--gold-deep);text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--gold-border)">${escHtml(ancestorVal)}</div>` : ''}

        await runSealingAnimation(card);
        // IMPORTANT: pass the captured form snapshot to runSave so it
        // doesn't try to re-read DOM inputs that no longer exist after

        await runSave(formSnapshot);

    /**
     * Step 2 of publish ceremony: visual sealing animation, framed around
     * the Clan Herald. The shield (his avatar in join-chat.html) sits at
     * the centre with a gold ring closing around it; the messages quote
     * the Herald narrating the act of sealing in his voice. ~3 seconds
     * of ceremony before the actual save fires.
     */
    async function runSealingAnimation(card) {
      card.innerHTML = `
        <div style="text-align:center;padding:36px 20px">
          <!-- Shield (the Herald's avatar) at the centre, with a gold
               ring rotating around it — the visual metaphor of a wax
               seal being drawn. The shield sits inside an ink-dark
               circle to echo the chat avatar treatment. -->
          <div style="position:relative;width:160px;height:160px;margin:0 auto 28px">
            <div style="position:absolute;inset:0;border:2px solid var(--gold-border);border-radius:50%"></div>
            <div style="position:absolute;inset:0;border:3px solid transparent;border-top-color:var(--gold);border-right-color:var(--gold);border-radius:50%;animation:sealSpin 1.4s cubic-bezier(.65,0,.35,1) infinite"></div>
            <div style="position:absolute;inset:14px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center">
              <img src="/coat_of_arms.png" alt="" style="width:78px;height:auto;display:block">
            </div>
          </div>

          <div style="font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">The Clan Herald</div>
          <div id="sealMsg" style="font-family:'EB Garamond',serif;font-size:20px;font-style:italic;color:var(--ink);line-height:1.5;min-height:60px;max-width:480px;margin:0 auto;transition:opacity .35s ease">"I take up the quill…"</div>

          <div style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-top:22px">Newhall House · Co. Clare</div>
        </div>
        <style>
          @keyframes sealSpin { to { transform: rotate(360deg); } }
        </style>
      `;
      // Four quoted lines from the Herald — narrating the act of
      // sealing in his voice. Same register as his join-chat lines:
      // ceremonious, first person, formal Hiberno-English. The new
      // third line ('The seal of Ó Comáin is taken to the wax…')
      // names the physical sealing moment between 'entered in the
      // Register' and 'done'. User feedback was that the previous
      // 3-message sequence advanced too quickly to read each line —
      // hence both more lines AND slower per-line dwell below.
      const messages = [
        '"I take up the quill…"',
        '"Your name is entered in the Register at Newhall…"',
        '"The seal of Ó Comáin is taken to the wax…"',
        '"It is done. Your certificate is sealed."',
      ];
      const sealMsg = document.getElementById('sealMsg');
      // Per-message dwell raised from 1.1s → 2.0s and the fade slowed
      // from 200ms → 350ms (CSS transition matched). Total time
      // before the final 'It is done' beat: 3 × (2.0 + 0.35) ≈ 7s,
      // versus ~2.6s previously. The final beat holds during the
      // actual API call which takes 10-15s, so the whole ceremony
      // reads as a measured rite — first the quill, then the
      // register, then the wax, then the seal — rather than a quick
      // status-message blur before a long pause.
      for (let i = 1; i < messages.length; i++) {
        await new Promise(r => setTimeout(r, 2000));
        if (sealMsg) {
          sealMsg.style.opacity = '0';
          await new Promise(r => setTimeout(r, 350));
          sealMsg.textContent = messages[i];
          sealMsg.style.opacity = '1';
        }
      }
      // Hold the final beat ~600ms before the actual save fires; the
      // API call itself then extends this hold for as long as it
      // takes the server to generate and store the cert PDF. Total
      // ceremony ~7s of message arc + however long the API takes.
      await new Promise(r => setTimeout(r, 600));
    }

    /**
     * Read all four form fields from the live modal DOM. Returns a frozen
     * snapshot object: { name, ancestor, partner, children[] }. Used both
     * for the immediate save path (re-edit case) AND, critically, for
     * capturing values BEFORE the ceremony replaces the modal HTML.
     */
    function readModalFormValues() {
      const nameEl = document.getElementById('famModalName');
      const ancestorEl = document.getElementById('famModalAncestor');
      const partnerEl = document.getElementById('famModalPartner');
      const childrenEl = document.getElementById('famModalChildren');
      const childrenRaw = childrenEl ? childrenEl.value.trim() : '';
      return Object.freeze({
        name:     nameEl ? nameEl.value.trim() : '',
        ancestor: ancestorEl ? ancestorEl.value.trim() : '',
        partner:  partnerEl ? partnerEl.value.trim() : '',
        children: childrenRaw ? childrenRaw.split(/[\n,]/).map(s => s.trim()).filter(Boolean) : [],
      });
    }

    /**
     * The actual save+publish API call. Reads the form fields, fires
     * /api/update-family-details, handles the response. Now invoked
     * either directly (re-edit save) or after the ceremony (first publish).
     *
     * @param {object} [snapshot] - optional pre-captured values from
     *   readModalFormValues(). REQUIRED when called from the publish
     *   ceremony, since the ceremony replaces the modal innerHTML and
     *   the form inputs no longer exist by the time this runs. If
     *   absent, we read live from the DOM (re-edit save case where
     *   the form is still present).
     */
    async function runSave(snapshot) {
      const values = snapshot || readModalFormValues();
      const nameVal = values.name || (member.name || '');
      const ancestorVal = values.ancestor;
      const partner = values.partner;
      const children = values.children;
      const statusEl = document.getElementById('famModalStatus');
      const saveBtn = document.getElementById('famModalSave');
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';
      }
      try {
        const session = await currentSession();
        if (!session) { window.location.href = '/members/login.html'; return; }
        const r = await fetch('/api/update-family-details', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({
            nameOnCert: nameVal || null,
            ancestorDedication: ancestorVal || null,
            partnerName: partner || null,
            childrenFirstNames: children,
          }),
        });
        if (!r.ok) { const j = await r.json().catch(()=>({})); throw new Error(j.error || 'Save failed'); }
        const result = await r.json().catch(() => ({}));
        if (statusEl) {
          statusEl.style.display = 'block';
          statusEl.style.background = 'rgba(184,151,90,.15)';
          statusEl.style.color = 'var(--ink)';
          if (result.certLocked) {
            statusEl.innerHTML = 'Saved to the Register at Newhall House. Your certificate PDF is locked — contact <a href="mailto:clan@ocomain.org" style="color:var(--gold)">clan@ocomain.org</a> to request a new cert.';
          } else if (result.published) {
            statusEl.innerHTML = '<strong>Sealed.</strong> Your certificate has been entered in the Register at Newhall House. Reloading…';
          } else {
            statusEl.innerHTML = 'Saved. Your certificate has been regenerated. Reloading…';
          }
        }
        // Auto-trigger the cert download on first publish — they shouldn't
        // have to click again. The signed URL carries Content-Disposition:
        // attachment so the browser saves the file rather than navigating.
        // Hidden anchor click is the most reliable cross-browser path.
        if (result.published && result.certUrl) {
          const a = document.createElement('a');
          a.href = result.certUrl;
          a.rel = 'noopener';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }
        setTimeout(() => window.location.reload(), 1800);
      } catch (e) {
        if (statusEl) {
          statusEl.style.display = 'block';
          statusEl.style.background = 'rgba(192,57,43,.08)';
          statusEl.style.color = '#922c1f';
          statusEl.textContent = 'Could not save — ' + (e.message || 'please try again');
        }
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = isPublished ? 'Save to Register' : 'Seal my certificate';
        }
      }
    }

    /**
     * Re-bind modal event listeners after a back-from-ceremony rebuild.
     * The Cancel button + Save button get re-rendered with the original
     * innerHTML, so their click handlers must be re-attached.
     */
    function wireModalAfterRebuild() {
      document.getElementById('famModalCancel')?.addEventListener('click', close);
      document.getElementById('famModalSave')?.addEventListener('click', async () => {
        // Multi-name pre-submit check — same as the original handler
        // above. See looksLikeMultipleNames() for detection logic.
        const nameInputEl = document.getElementById('famModalName');
        const nameValue = nameInputEl ? nameInputEl.value.trim() : '';
        if (looksLikeMultipleNames(nameValue)) {
          const isFamilyTier = !!member.tier_family;
          const guidance = isFamilyTier
            ? 'The certificate names ONE primary member. If you want to add a partner or family, please use the partner and children fields below — leave this field as your own name only.'
            : 'An individual-tier certificate names ONE person. If you wish to record a partner or family, that requires a Family-tier membership.';
          const proceed = confirm(
            `The name "${nameValue}" looks like it contains more than one person.\n\n${guidance}\n\nIf this really is one person\u2019s name and we have it wrong, click OK to proceed anyway. For special cases (e.g. legal name with \u201cand\u201d in it), you can also write to clan@ocomain.org.`
          );
          if (!proceed) return;
        }
        // Children: full-name-not-first-name detection — see the original
        // handler above for the full rationale and detection heuristic.
        const childrenInputEl = document.getElementById('famModalChildren');
        const childrenRaw = childrenInputEl ? childrenInputEl.value.trim() : '';
        if (childrenRaw) {
          const childEntries = childrenRaw.split(/[\n,]/).map(s => s.trim()).filter(Boolean);
          const suspicious = childEntries.filter(c => c.split(/\s+/).length >= 3);
          if (suspicious.length > 0) {
            const list = suspicious.map(s => `"${s}"`).join(', ');
            const proceed = confirm(
              `The following ${suspicious.length === 1 ? 'entry looks' : 'entries look'} like ${suspicious.length === 1 ? 'a full name' : 'full names'} rather than first ${suspicious.length === 1 ? 'name' : 'names'}: ${list}.\n\nThe Register and certificate are designed to show your children's first names only — the family surname is already carried in your own entry, and full legal names are kept private.\n\nClick OK to use ${suspicious.length === 1 ? 'this entry' : 'these entries'} as written, or Cancel to go back and shorten ${suspicious.length === 1 ? 'it' : 'them'} to just the first name.`
            );
            if (!proceed) return;
          }
        }

        // Ancestor dedication validation — see original handler
        // above for full rationale (length cap + duplicate-prefix
        // detection).
        const ancestorInputEl = document.getElementById('famModalAncestor');
        const ancestorRaw = ancestorInputEl ? ancestorInputEl.value.trim() : '';
        if (ancestorRaw) {
          if (ancestorRaw.length > 100) {
            alert(`Your dedication is ${ancestorRaw.length} characters. Please shorten it to 100 characters or fewer — the certificate prints the dedication on a single italic line, and longer text will not fit.\n\nYour current text:\n"${ancestorRaw}"`);
            return;
          }
          const knownPrefixes = ['In memory of', 'In honour of', 'For'];
          for (const p of knownPrefixes) {
            const lcd = ancestorRaw.toLowerCase();
            for (const q of knownPrefixes) {
              if (lcd.startsWith((p + ' ' + q + ' ').toLowerCase())) {
                alert(`Your dedication starts with "${p} ${q}" — the prefix is duplicated. Please remove the second one before sealing so the certificate reads as you want it.\n\nYour current text:\n"${ancestorRaw}"`);
                return;
              }
            }
          }
        }

        if (!isPublished) {
          await runPublishCeremony();
          return;
        }
        await runSave();
      });
    }
  }
